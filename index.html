<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🗺️ 세계지도 색칠하기</title>
  <style>
    html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; }
    body { display: flex; flex-direction: column; font-family: sans-serif; }
    #toolbar {
      background: #f8f8f8;
      padding: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      border-bottom: 1px solid #ddd;
      flex: 0 0 auto;
    }
    #map {
      flex: 1 1 auto;
      width: 100%;
      height: 100%;
    }
    .country { cursor: pointer; stroke: #666; stroke-width: 0.3px; }
    /* 국해선(육지 외곽선) 스타일 */
    .outline { fill: none; stroke: #666; stroke-width: 0.3px; pointer-events: none; }
    .selected { stroke: #333; }
    .labels { font-size: 10px; fill: #333; pointer-events: none; }
    .equator-line { fill: none; stroke: red; stroke-width: 0.3px; }
    .grid-line { stroke: #cccccc; stroke-width: 0.5px; stroke-dasharray: 2 2; fill: none; }
    .palette-box {
      width: 20px;
      height: 20px;
      border: 1px solid #aaa;
      cursor: pointer;
      transition: transform 0.15s ease, border-color 0.15s ease;
    }
    .palette-box:hover {
      transform: scale(1.2);
      border-color: #333;
    }
    header span { cursor: pointer; }

    #tooltip {
      position: fixed;
      display: none;
      padding: 4px 6px;
      font-size: 12px;
      color: #fff;
      background: rgba(0,0,0,0.8);
      border-radius: 4px;
      pointer-events: none;
      z-index: 9999;
      white-space: nowrap;
      transform: translate(0, 0);
      will-change: transform;
    }
  </style>
</head>
<body>
<header style="background: pink; color: #fff; padding: 10px; font-size: 18px; display: flex; justify-content: space-between; align-items: center; position: relative;">
  <span>세계지도 색칠하기2 🎗️🗺️🖌️ v1.5 20260409</span>
  <div id="iconLinks" style="display: flex; gap: 12px; align-items: center; position: relative;">
    <a href="https://buymeacoffee.com/geotasoo" target="_blank" data-tip="커피보내기" style="color: #fff; font-size: 18px; text-decoration: none;">☕</a>
    <a href="https://geotasoo.tistory.com/entry/%EC%84%B8%EA%B3%84%EC%A7%80%EB%8F%84-%EC%83%89%EC%B9%A0%ED%95%98%EA%B8%B0-%EC%9B%B9%ED%8E%98%EC%9D%B4%EC%A7%80" target="_blank" data-tip="사용법보기/생각나누기" style="color: #fff; font-size: 18px; text-decoration: none;">🏃🏻‍➡️</a>
    <a href="https://geotasoo.tistory.com/entry/%EC%9A%B0%EB%A6%AC%EB%82%98%EB%9D%BC-%EC%A7%80%EB%8F%84-%EC%83%89%EC%B9%A0%ED%95%98%EA%B8%B0-%EC%9B%B9%ED%8E%98%EC%9D%B4%EC%A7%80" target="_blank" data-tip="우리나라 지도 색칠하기" style="color: #fff; font-size: 18px; text-decoration: none;">🐯</a>
    <div id="linkTooltip" style="display:none; position:fixed; background:rgba(0,0,0,0.8); color:#fff; font-size:12px; padding:4px 6px; border-radius:4px; white-space:nowrap; pointer-events:none; z-index:9999;"></div>
  </div>
</header>

<div id="toolbar">
  <label>색상: <input type="color" id="colorPicker" value="#FFD700"></label>
  <div id="paletteButtons" style="display: flex; gap: 6px;">
    <div class="palette-box" data-color="#222222" style="background:#222222;"></div>
    <div class="palette-box" data-color="#555555" style="background:#555555;"></div>
    <div class="palette-box" data-color="#888888" style="background:#888888;"></div>
    <div class="palette-box" data-color="#BBBBBB" style="background:#BBBBBB;"></div>
    <div class="palette-box" data-color="#DDDDDD" style="background:#DDDDDD;"></div>
  </div>
  <label>육지 색상:
    <select id="baseColorSelect">
      <option value="#ffffff">하얀색</option>
      <option value="#eeeeee">옅은 회색</option>
    </select>
  </label>
  <label>바다 색상:
    <select id="oceanColorSelect">
      <option value="#ffffff">하얀색</option>
      <option value="#e0f0ff" selected>하늘색</option>
    </select>
  </label>
  <label>선 굵기:
    <input type="range" id="strokeWidth" min="0.1" max="1.0" step="0.1" value="0.3">
    <span id="strokeValue">0.3px</span>
  </label>
  <button id="toggleBorders">국경 보이기/숨기기</button>
  <button id="toggleLabels">나라이름 보이기/숨기기</button>
  <button id="toggleGrids">위선경선 보이기/숨기기</button>
  <button id="toggleEquator">적도선 보이기/숨기기</button>
  <button id="zoomIn">＋</button>
  <button id="zoomOut">－</button>
  <button id="resetZoom">초기화</button>
  <button id="savePng">PNG 저장</button>
  <span id="zoomLevel">확대 레벨: 1.00</span>
</div>

<div id="tooltip"></div>
<svg id="map" preserveAspectRatio="xMidYMid meet"></svg>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://unpkg.com/topojson-client@3"></script>
<script>
(async function () {
  const svg = d3.select("#map");
  const vw = window.innerWidth;
  const vh = window.innerHeight - document.getElementById("toolbar").offsetHeight;
  svg.attr("viewBox", `0 0 ${vw} ${vh}`);

  const background = svg.insert("rect", ":first-child")
    .attr("x", -vw).attr("y", -vh).attr("width", vw * 3).attr("height", vh * 3)
    .attr("fill", document.getElementById("oceanColorSelect").value);

  const projection = d3.geoMercator().center([128, 36]).scale(vw / (2 * Math.PI)).translate([vw / 2, vh / 2]);
  const path = d3.geoPath().projection(projection);

  const mapGroup1 = svg.append("g").attr("class", "map1");
  const mapGroup2 = svg.append("g").attr("class", "map2").attr("transform", `translate(${vw},0)`);
  
  // ◆ 국해선(외곽선) 그룹 추가
  const outlineGroup1 = svg.append("g").attr("class", "outline1");
  const outlineGroup2 = svg.append("g").attr("class", "outline2").attr("transform", `translate(${vw},0)`);

  const labelsGroup1 = svg.append("g").attr("class", "labels1");
  const labelsGroup2 = svg.append("g").attr("class", "labels2");
  const gridGroup1 = svg.append("g").attr("class", "grids1");
  const gridGroup2 = svg.append("g").attr("class", "grids2");
  const equatorGroup1 = svg.append("g").attr("class", "equator1");
  const equatorGroup2 = svg.append("g").attr("class", "equator2");

  let gridVisible = false;
  let labelsVisible = false;
  let equatorVisible = true;
  let bordersVisible = true; // ◆ 국경 표시 상태 변수

  const graticule = d3.geoGraticule().step([30, 30]);
  gridGroup1.append("path").datum(graticule()).attr("class", "grid-line").attr("d", path).style("display", "none");
  gridGroup2.append("path").datum(graticule()).attr("class", "grid-line").attr("d", path).attr("transform", `translate(${vw},0)`).style("display", "none");

  const equator = { type: "LineString", coordinates: d3.range(-180, 181, 1).map(lon => [lon, 0]) };
  equatorGroup1.append("path").datum(equator).attr("class", "equator-line").attr("d", path);
  equatorGroup2.append("path").datum(equator).attr("class", "equator-line").attr("d", path).attr("transform", `translate(${vw},0)`);

  const world = await d3.json("https://unpkg.com/world-atlas@2/countries-50m.json");
  const features = topojson.feature(world, world.objects.countries).features;
  
  // ◆ 모든 국가를 합쳐 육지 외곽선(Coastline) 데이터 생성
  const mergedLand = topojson.merge(world, world.objects.countries.geometries);
  [outlineGroup1, outlineGroup2].forEach((group, i) => {
    group.append("path").datum(mergedLand).attr("class", "outline").attr("d", path);
  });

  const countryColors = new Map();
  const tooltip = d3.select('#tooltip');

  [mapGroup1, mapGroup2].forEach(group => {
    group.selectAll("path.country")
      .data(features)
      .enter().append("path")
      .attr("class", "country")
      .attr("d", path)
      .attr("fill", "#ffffff")
      .on("click", (event, d) => {
        const id = d.id;
        if (countryColors.has(id)) countryColors.delete(id);
        else countryColors.set(id, document.getElementById("colorPicker").value);
        updateColors();
      })
      .on("pointerenter", (event, d) => tooltip.style("display", "block").text(d.properties.name))
      .on("pointermove", (event) => tooltip.style("transform", `translate(${event.clientX + 26}px, ${event.clientY + 28}px)`))
      .on("pointerleave", () => tooltip.style("display", "none"));
  });

  // ◆ 국경 보이기/숨기기 버튼 로직
  document.getElementById("toggleBorders").onclick = () => {
    bordersVisible = !bordersVisible;
    svg.selectAll("path.country").style("stroke", bordersVisible ? "#666" : "none");
  };

  function updateColors() {
    const base = document.getElementById("baseColorSelect").value;
    [mapGroup1, mapGroup2].forEach(group => {
      group.selectAll("path.country")
        .attr("fill", d => countryColors.get(d.id) || base);
    });
  }

  function updateLabels() {
    [labelsGroup1, labelsGroup2].forEach((g, i) => {
      g.selectAll("text").remove();
      g.selectAll("text").data(features).enter().append("text")
        .attr("class", "labels")
        .attr("x", d => projection(d3.geoCentroid(d))[0] + (i===1 ? vw : 0))
        .attr("y", d => projection(d3.geoCentroid(d))[1])
        .text(d => d.properties.name)
        .style("display", labelsVisible ? "block" : "none");
    });
  }

  const zoomBehavior = d3.zoom().scaleExtent([0.5, 8]).on("zoom", ({transform}) => {
    const {k, x, y} = transform;
    const allGroups1 = [mapGroup1, outlineGroup1, labelsGroup1, gridGroup1, equatorGroup1];
    const allGroups2 = [mapGroup2, outlineGroup2, labelsGroup2, gridGroup2, equatorGroup2];
    allGroups1.forEach(g => g.attr("transform", transform));
    allGroups2.forEach(g => g.attr("transform", `translate(${vw * k + x},${y}) scale(${k})`));
    document.getElementById("zoomLevel").innerText = `확대 레벨: ${k.toFixed(2)}`;
  });
  svg.call(zoomBehavior).on("dblclick.zoom", null);

  // 툴바 이벤트들
  document.getElementById("strokeWidth").addEventListener("input", () => {
    const w = document.getElementById("strokeWidth").value;
    document.getElementById("strokeValue").textContent = w + 'px';
    // ◆ 육지 외곽선(.outline)도 함께 굵어지게 설정
    svg.selectAll("path.country, .equator-line, .grid-line, .outline").style("stroke-width", w + 'px');
  });

  document.getElementById("resetZoom").onclick = () => {
    svg.transition().call(zoomBehavior.transform, d3.zoomIdentity);
    countryColors.clear();
    bordersVisible = true;
    svg.selectAll("path.country").style("stroke", "#666");
    updateColors(); updateLabels();
    background.attr("fill", "#e0f0ff");
    document.getElementById("oceanColorSelect").value = "#e0f0ff";
    document.getElementById("strokeWidth").value = "0.3";
    document.getElementById("strokeValue").textContent = "0.3px";
    svg.selectAll("path.country, .equator-line, .grid-line, .outline").style("stroke-width", "0.3px");
  };

  // 나머지 버튼들
  document.getElementById("toggleLabels").onclick = () => { labelsVisible = !labelsVisible; updateLabels(); };
  document.getElementById("toggleGrids").onclick = () => { gridVisible = !gridVisible; gridGroup1.style("display", gridVisible?"block":"none"); gridGroup2.style("display", gridVisible?"block":"none"); };
  document.getElementById("toggleEquator").onclick = () => { equatorVisible = !equatorVisible; equatorGroup1.style("display", equatorVisible?"block":"none"); equatorGroup2.style("display", equatorVisible?"block":"none"); };
  document.getElementById("zoomIn").onclick = () => svg.transition().call(zoomBehavior.scaleBy, 1.3);
  document.getElementById("zoomOut").onclick = () => svg.transition().call(zoomBehavior.scaleBy, 0.7);
  document.getElementById("oceanColorSelect").onchange = () => background.attr("fill", document.getElementById("oceanColorSelect").value);
  document.getElementById("baseColorSelect").onchange = updateColors;
  document.querySelectorAll('.palette-box').forEach(box => box.onclick = () => document.getElementById('colorPicker').value = box.dataset.color);

  updateColors();
})();

// PNG 저장 (기존 로직 유지하며 .outline 포함)
document.getElementById('savePng').addEventListener('click', () => {
  const svgNode = document.getElementById('map');
  const serializer = new XMLSerializer();
  const svgString = serializer.serializeToString(svgNode);
  const blob = new Blob([svgString], { type: 'image/svg+xml;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const image = new Image();
  image.onload = () => {
    const canvas = document.createElement('canvas');
    canvas.width = svgNode.clientWidth * 2; canvas.height = svgNode.clientHeight * 2;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(image, 0, 0, canvas.width, canvas.height);
    const pngUrl = canvas.toDataURL("image/png");
    const a = document.createElement('a'); a.href = pngUrl; a.download = 'coloring-map.png'; a.click();
  };
  image.src = url;
});
</script>
<footer style="position: fixed; bottom: 6px; right: 10px; font-size: 9px; color: #999; z-index: 999;"><a href="https://geotasoo.tistory.com" target="_blank" style="color: inherit; text-decoration: none;">@geotasoo.com</a></footer>
</body>
</html>
