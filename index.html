<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🗺️ 세계지도 색칠하기 v1.6</title>
  <style>
    html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; }
    body { display: flex; flex-direction: column; font-family: sans-serif; }
    #toolbar {
      background: #f8f8f8;
      padding: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      border-bottom: 1px solid #ddd;
      flex: 0 0 auto;
    }
    #map {
      flex: 1 1 auto;
      width: 100%;
      height: 100%;
    }
    .country { cursor: pointer; stroke: #666; stroke-width: 0.3px; }
    .outline { fill: none; stroke: #666; stroke-width: 0.3px; pointer-events: none; }
    .selected { stroke: #333; }
    .labels { font-size: 10px; fill: #333; pointer-events: none; }
    .equator-line { fill: none; stroke: red; stroke-width: 0.3px; }
    .grid-line { stroke: #cccccc; stroke-width: 0.5px; stroke-dasharray: 2 2; fill: none; }
    .palette-box {
      width: 20px;
      height: 20px;
      border: 1px solid #aaa;
      cursor: pointer;
      transition: transform 0.15s ease, border-color 0.15s ease;
    }
    .palette-box:hover {
      transform: scale(1.2);
      border-color: #333;
    }
    header span { cursor: pointer; }

    #tooltip {
      position: fixed;
      display: none;
      padding: 4px 6px;
      font-size: 12px;
      color: #fff;
      background: rgba(0,0,0,0.8);
      border-radius: 4px;
      pointer-events: none;
      z-index: 9999;
      white-space: nowrap;
      transform: translate(0, 0);
      will-change: transform;
    }
    button { cursor: pointer; padding: 4px 8px; }
  </style>
</head>
<body>
<header style="background: pink; color: #fff; padding: 10px; font-size: 18px; display: flex; justify-content: space-between; align-items: center; position: relative;">
  <span>세계지도 색칠하기 🎗️ v1.6 👁️🙈</span>
  <div id="iconLinks" style="display: flex; gap: 12px; align-items: center; position: relative;">
    <a href="https://buymeacoffee.com/geotasoo" target="_blank" data-tip="커피보내기" style="color: #fff; font-size: 18px; text-decoration: none;">☕</a>
    <a href="https://geotasoo.tistory.com" target="_blank" data-tip="사용법보기" style="color: #fff; font-size: 18px; text-decoration: none;">🏃🏻‍➡️</a>
    <div id="linkTooltip" style="display:none; position:fixed; background:rgba(0,0,0,0.8); color:#fff; font-size:12px; padding:4px 6px; border-radius:4px; z-index:9999;"></div>
  </div>
</header>

<div id="toolbar">
  <label>색상: <input type="color" id="colorPicker" value="#FFD700"></label>
  <div id="paletteButtons" style="display: flex; gap: 6px;">
    <div class="palette-box" data-color="#222222" style="background:#222222;"></div>
    <div class="palette-box" data-color="#888888" style="background:#888888;"></div>
    <div class="palette-box" data-color="#BBBBBB" style="background:#BBBBBB;"></div>
    <div class="palette-box" data-color="#DDDDDD" style="background:#DDDDDD;"></div>
  </div>
  <label>육지 색:
    <select id="baseColorSelect">
      <option value="#ffffff">하얀색</option>
      <option value="#eeeeee">옅은 회색</option>
    </select>
  </label>
  <label>바다 색:
    <select id="oceanColorSelect">
      <option value="#ffffff">하얀색</option>
      <option value="#e0f0ff" selected>하늘색</option>
    </select>
  </label>
  <label>선 굵기:
    <input type="range" id="strokeWidth" min="0.1" max="1.0" step="0.1" value="0.3">
    <span id="strokeValue">0.3px</span>
  </label>
  
  <button id="toggleBorders">국경 👁️</button>
  <button id="toggleLabels">나라 이름 🙈</button>
  <button id="toggleGrids">위선경선 🙈</button>
  <button id="toggleEquator">적도선 👁️</button>
  
  <button id="resetZoom">초기화</button>
  <button id="savePng">PNG 저장</button>
</div>

<div id="tooltip"></div>
<svg id="map" preserveAspectRatio="xMidYMid meet"></svg>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://unpkg.com/topojson-client@3"></script>
<script>

  [gridGroup1, gridGroup2].forEach((g, i) => {

  });

  [equatorGroup1, equatorGroup2].forEach((g, i) => {
    g.append("path").datum(equator).attr("class", "equator-line").attr("d", path).attr("transform", i === 1 ? `translate(${vw},0)` : "");
  });

  [outlineGroup1, outlineGroup2].forEach((g, i) => {

  });

  const tooltip = d3.select('#tooltip');

    group.selectAll("path.country").data(features).enter().append("path")
