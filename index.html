<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🗺️ 세계지도 색칠하기 v1.8</title>
  <style>
    html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; }
    body { display: flex; flex-direction: column; font-family: sans-serif; }
    #toolbar {
      background: #f8f8f8; padding: 8px; display: flex; flex-wrap: wrap;
      gap: 12px; align-items: center; border-bottom: 1px solid #ddd; flex: 0 0 auto;
    }
    #map { flex: 1 1 auto; width: 100%; height: 100%; display: block; }
    .country { cursor: pointer; stroke: #666; stroke-width: 0.3px; }
    /* 국경 꺼도 남는 육지 외곽선 */
    .outline { fill: none; stroke: #666; stroke-width: 0.3px; pointer-events: none; }
    .labels { font-size: 10px; fill: #333; pointer-events: none; }
    .equator-line { fill: none; stroke: red; stroke-width: 0.3px; }
    .grid-line { stroke: #cccccc; stroke-width: 0.5px; stroke-dasharray: 2 2; fill: none; }
    .palette-box { width: 20px; height: 20px; border: 1px solid #aaa; cursor: pointer; }
    header span { cursor: pointer; }
    #tooltip {
      position: fixed; display: none; padding: 4px 6px; font-size: 12px;
      color: #fff; background: rgba(0,0,0,0.8); border-radius: 4px;
      pointer-events: none; z-index: 9999;
    }
    button { cursor: pointer; padding: 4px 8px; font-size: 13px; min-width: 80px; }
  </style>
</head>
<body>

<header style="background: pink; color: #fff; padding: 10px; font-size: 18px; display: flex; justify-content: space-between; align-items: center;">
  <span>세계지도 색칠하기 🎗️ v1.8</span>
  <div id="iconLinks" style="display: flex; gap: 12px; align-items: center;">
    <a href="https://buymeacoffee.com/geotasoo" target="_blank" style="color: #fff; text-decoration: none;">☕</a>
    <a href="https://geotasoo.tistory.com" target="_blank" style="color: #fff; text-decoration: none;">🏃🏻‍♂️</a>
  </div>
</header>

<div id="toolbar">
  <label>색상: <input type="color" id="colorPicker" value="#FFD700"></label>
  <div id="paletteButtons" style="display: flex; gap: 6px;">
    <div class="palette-box" data-color="#222222" style="background:#222222;"></div>
    <div class="palette-box" data-color="#888888" style="background:#888888;"></div>
    <div class="palette-box" data-color="#FFFFFF" style="background:#FFFFFF;"></div>
  </div>
  
  <label>바다:
    <select id="oceanColorSelect">
      <option value="#ffffff">하얀색</option>
      <option value="#e0f0ff" selected>하늘색</option>
    </select>
  </label>
  
  <label>선 굵기:
    <input type="range" id="strokeWidth" min="0.1" max="1.0" step="0.1" value="0.3">
  </label>

  <button id="toggleBorders">국경 👁️</button>
  <button id="toggleLabels">나라 이름 🙈</button>
  <button id="toggleGrids">위선경선 🙈</button>
  <button id="toggleEquator">적도선 👁️</button>
  
  <button id="resetZoom">초기화</button>
  <button id="savePng">PNG 저장</button>
</div>

<div id="tooltip"></div>
<svg id="map"></svg>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://unpkg.com/topojson-client@3"></script>
<script>
(async function () {
  const svg = d3.select("#map");
  // 툴바 높이를 안전하게 계산
  const vw = window.innerWidth;
  const vh = window.innerHeight - 100; 
  svg.attr("viewBox", `0 0 ${vw} ${vh}`);

  const background = svg.append("rect")
    .attr("x", -vw * 2).attr("y", -vh * 2).attr("width", vw * 5).attr("height", vh * 5)
    .attr("fill", "#e0f0ff");

  const path = d3.geoPath().projection(projection);

  const mapGroup1 = svg.append("g");
  const mapGroup2 = svg.append("g").attr("transform", `translate(${vw},0)`);
  const outlineGroup1 = svg.append("g");
  const outlineGroup2 = svg.append("g").attr("transform", `translate(${vw},0)`);
  const gridGroup1 = svg.append("g");
  const gridGroup2 = svg.append("g").attr("transform", `translate(${vw},0)`);
  const equatorGroup1 = svg.append("g");
  const equatorGroup2 = svg.append("g").attr("transform", `translate(${vw},0)`);

  const labelsGroup2 = svg.append("g");

  const tooltip = d3.select('#tooltip');

  // 1. 국가 그리기
  [mapGroup1, mapGroup2].forEach(g => {
    g.selectAll("path").data(features).enter().append("path")
      .attr("class", "country")
      .attr("d", path)
      .attr("fill", "#ffffff")
      .on("click", function(e, d) {
        const id = d.id;
        if (countryColors.has(id)) countryColors.delete(id);
        else countryColors.set(id, document.getElementById("colorPicker").value);
        updateAllColors();
      })
      .on("pointerenter", (e, d) => tooltip.style("display", "block").text(d.properties.name))
      .on("pointermove", (e) => tooltip.style("left", (e.clientX + 15) + "px").style("top", (e.clientY + 15) + "px"))
      .on("pointerleave", () => tooltip.style("display", "none"));
  });

  // 2. 외곽선 (국경 꺼도 남는 선)
  [outlineGroup1, outlineGroup2].forEach(g => {
    g.append("path").datum(mergedLand).attr("class", "outline").attr("d", path);
  });

  // 3. 위경도선
  const graticule = d3.geoGraticule().step([30, 30]);
  [gridGroup1, gridGroup2].forEach(g => {
    g.append("path").datum(graticule()).attr("class", "grid-line").attr("d", path).style("display", "none");
  });

  const equatorData = { type: "LineString", coordinates: d3.range(-180, 181, 1).map(lon => [lon, 0]) };
