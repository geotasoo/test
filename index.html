    .pin-row { display:flex; justify-content:space-between; align-items:center; padding:5px 8px; font-size:12px; border-bottom:1px solid #f0f0f0; }

    <div id="linkTooltip" style="display:none; position:fixed; background:rgba(0,0,0,0.85); color:#fff; font-size:12px; padding:4px 6px; border-radius:4px; white-space:nowrap; pointer-events:none; z-index:9999;"></div>
  </div>
</header>
<script>
(function(){
  const links=document.querySelectorAll('#iconLinks a'), tt=document.getElementById('linkTooltip');
  links.forEach(l=>{
    l.addEventListener('pointerenter',()=>{tt.textContent=l.dataset.tip||'';tt.style.display='block';});
    l.addEventListener('pointermove',e=>{let x=e.clientX-tt.offsetWidth-10,y=e.clientY+20;if(x<0)x=e.clientX+15;tt.style.left=Math.max(5,x)+'px';tt.style.top=Math.max(5,y)+'px';});
    l.addEventListener('pointerleave',()=>{tt.style.display='none';});
  });
})();
</script>

function closePanels(){dotMode=false;$('city-panel').classList.remove('open');$('pin-panel').classList.remove('open');$('btn-dot-panel').textContent='📍 점찍기';$('btn-dot-panel').classList.remove('active');map.getContainer().style.cursor='';}
$('btn-dot-panel').addEventListener('click',()=>{if(dotMode)closePanels();else openPanels();});

// 북측 토글: ON/OFF + 화면 맞춤
$('btn-nk').addEventListener('click',()=>{
  nkVisible=!nkVisible;
  const btn=$('btn-nk');
  if(nkVisible){
    if(nkLayer)map.addLayer(nkLayer);
    btn.textContent='🌕 북측';
    btn.style.background='';btn.style.color='';
  } else {
    if(nkLayer)map.removeLayer(nkLayer);
    btn.textContent='🌑 북측';
    btn.style.background='';btn.style.color='';
  }
  fitMapBounds();
});

// 화면 맞춤 함수
function fitMapBounds(){
  const layers=[];
  if(borderMode===1 && skLayer) layers.push(skLayer);
  else {
    if(sdLayer)layers.push(sdLayer);
    if(sdBorderLayer)layers.push(sdBorderLayer);
    if(borderMode===3 && sgLayer)layers.push(sgLayer);
  }
  if(nkVisible && nkLayer)layers.push(nkLayer);
  if(layers.length>0){
    try{ map.fitBounds(L.featureGroup(layers).getBounds(),{padding:[20,20]}); }catch(e){}
  }
}
$('btn-city-panel-close').addEventListener('click',closePanels);
$('btn-pin-panel-close').addEventListener('click',closePanels);
$('btn-city-deselect').addEventListener('click',()=>{selectedCities.clear();renderDots();buildDotList($('dot-search').value.toLowerCase());});
$('btn-pin-deselect').addEventListener('click',()=>{manualPins=[];renderDots();buildPinList();});

$('dot-search').addEventListener('input',e=>{const t=e.target.value.toLowerCase();$('btn-search-clear').style.display=t?'inline':'none';if(t)SIDO_ORDER.forEach(s=>sidoCollapsed.delete(s));else SIDO_ORDER.forEach(s=>sidoCollapsed.add(s));buildDotList(t);});
$('btn-search-clear').addEventListener('click',()=>{$('dot-search').value='';$('btn-search-clear').style.display='none';SIDO_ORDER.forEach(s=>sidoCollapsed.add(s));buildDotList('');});

map.on('click',function(e){if(!dotMode)return;manualPins.push({lat:e.latlng.lat,lng:e.latlng.lng,id:Date.now()});renderDots();buildPinList();});

function buildDotList(st){
  const list=$('dot-list');list.innerHTML='';
  SIDO_ORDER.forEach(sido=>{
    const cities=KOREA_CITIES.filter(c=>c.sido===sido);if(!cities.length)return;
    const filtered=cities.filter(c=>c.name.toLowerCase().includes(st));if(!filtered.length)return;
    const col=sidoCollapsed.has(sido),sel=filtered.filter(c=>selectedCities.has(c.name)).length;
    const lb=document.createElement('div');lb.className='sido-label';
    lb.innerHTML=`<span>${sido}</span><span style="font-size:11px;color:#666;">${sel>0?'✔'+sel+' ':''}${col?'▶':'▼'}</span>`;
    lb.addEventListener('click',ev=>{if(ev.target.tagName==='BUTTON')return;if(col)sidoCollapsed.delete(sido);else sidoCollapsed.add(sido);buildDotList(st);});
    list.appendChild(lb);
    if(!col){
      const btns=document.createElement('div');btns.className='cat-btns';
      const sa=document.createElement('button');sa.textContent='전체선택';sa.addEventListener('click',()=>{filtered.forEach(c=>selectedCities.add(c.name));renderDots();buildDotList(st);});
      const da=document.createElement('button');da.textContent='전체해제';da.addEventListener('click',()=>{filtered.forEach(c=>selectedCities.delete(c.name));renderDots();buildDotList(st);});
      btns.appendChild(sa);btns.appendChild(da);list.appendChild(btns);
      filtered.forEach(city=>{
        const row=document.createElement('div');row.className='city-row';
        const cb=document.createElement('input');cb.type='checkbox';cb.checked=selectedCities.has(city.name);
        const nm=document.createElement('span');nm.className='city-name'+(selectedCities.has(city.name)?' checked':'');nm.textContent=city.name;
        const tog=()=>{if(selectedCities.has(city.name))selectedCities.delete(city.name);else selectedCities.add(city.name);renderDots();buildDotList(st);};
        cb.addEventListener('change',tog);nm.addEventListener('click',tog);
        row.appendChild(cb);row.appendChild(nm);list.appendChild(row);
      });
    }
  });
  const s=$('dot-summary');if(selectedCities.size===0){s.textContent='선택된 도시 없음';s.style.color='#aaa';}else{s.textContent='✔ '+selectedCities.size+'개 선택';s.style.color='#1a73e8';}
}

function buildPinList(){
  const list=$('pin-list'),s=$('pin-summary');list.innerHTML='';
  if(!manualPins.length){s.textContent='찍은 점 없음';s.style.color='#aaa';list.innerHTML='<div style="padding:40px 20px;text-align:center;color:#bbb;font-size:13px;">지도를 클릭해서<br>점을 찍어보세요 📍</div>';return;}
  s.textContent='✔ '+manualPins.length+'개';s.style.color='#1a73e8';
  manualPins.forEach((p,i)=>{
    const row=document.createElement('div');row.className='pin-row';
    const lb=document.createElement('span');lb.textContent=`${i+1}번 (${p.lat.toFixed(3)}, ${p.lng.toFixed(3)})`;lb.style.color='#555';
    const del=document.createElement('button');del.className='pin-del';del.textContent='✕';
    del.addEventListener('click',()=>{manualPins=manualPins.filter(x=>x.id!==p.id);renderDots();buildPinList();});
    row.appendChild(lb);row.appendChild(del);list.appendChild(row);
  });
}

function renderDots(){
  dotMarkers.forEach(m=>map.removeLayer(m));dotMarkers=[];
  const r=parseFloat($('dotSize').value),color=$('dotColor').value,stroke=$('dotStroke').checked;
  // circle은 미터 단위 - 슬라이더 값을 미터로 변환 (1→3000m, 12→36000m)
  const radiusM = r * 3000;
  // 현재 줌에서 반지름이 몇 픽셀인지 계산해서 테두리 비율 맞춤
  const c = map.getCenter();
  const p1 = map.latLngToContainerPoint(c);
  const p2 = map.latLngToContainerPoint(L.latLng(c.lat, c.lng + radiusM / (111320 * Math.cos(c.lat * Math.PI / 180))));
  const radiusPx = Math.abs(p2.x - p1.x);
  const strokeW = stroke ? Math.max(1.5, radiusPx * 0.15) : 0;
  const opts={radius:radiusM,fillColor:color,color:stroke?'#fff':'none',weight:strokeW,fillOpacity:1,pane:'markerPane'};
  KOREA_CITIES.filter(c=>selectedCities.has(c.name)).forEach(c=>{const m=L.circle([c.lat,c.lng],opts).addTo(map);m.on('mouseover',e=>showTT(c.name,e));m.on('mousemove',e=>showTT(c.name,e));m.on('mouseout',hideTT);dotMarkers.push(m);});
  manualPins.forEach((p,i)=>{const m=L.circle([p.lat,p.lng],opts).addTo(map);m.on('mouseover',e=>showTT('내가 찍은 점 '+(i+1),e));m.on('mousemove',e=>showTT('내가 찍은 점 '+(i+1),e));m.on('mouseout',hideTT);dotMarkers.push(m);});
}

function getSdStyle(l){return coloredSd.get(l._leaflet_id)?{color:'#444',weight:2,fillColor:highlightFill,fillOpacity:0.7,opacity:1}:{...defaultStyle.sd};}
function getSgStyle(l){return coloredSg.get(l._leaflet_id)?{color:'#444',weight:1,fillColor:highlightFill,fillOpacity:0.7,opacity:1}:{...defaultStyle.sg};}
function toggleSdLayerColor(l){coloredSd.set(l._leaflet_id,!coloredSd.get(l._leaflet_id));l.setStyle(getSdStyle(l));}
function toggleSgLayerColor(l){coloredSg.set(l._leaflet_id,!coloredSg.get(l._leaflet_id));l.setStyle(getSgStyle(l));}
function animateMapFade(cb){const m=$('map');m.classList.add('animated-fade');setTimeout(()=>{cb();m.classList.remove('animated-fade');m.classList.add('animated-fade-in');setTimeout(()=>m.classList.remove('animated-fade-in'),400);},300);}

document.addEventListener('click',e=>{if(!$('provinceDropdown').contains(e.target))$('provinceDropdown').classList.remove('open');});
$('provinceDropdownBtn').addEventListener('click',e=>{e.stopPropagation();$('provinceDropdown').classList.toggle('open');});

Promise.all([
  fetch('202604_sd.geojson').then(r=>r.json()),
  fetch('202604_sg.geojson').then(r=>r.json()),
  fetch('202604_nk.geojson').then(r=>r.json()),
  fetch('202604_sk.geojson').then(r=>r.json())
]).then(([sdJson,sgJson,nkJson,skJson])=>{

  // 북한 레이어 (토글 가능, 색칠 가능) - 기본 숨김
  nkLayer = L.geoJSON(nkJson,{
    style: ()=>({color:'#333', weight:parseFloat($('slider-nk').value), fillColor:'#ffffff', fillOpacity:defaultLandOpacity, opacity:1}),
    onEachFeature:(ft,ly)=>{
      ly.on('click',()=>{
        if(dotMode)return;
        const on=!coloredSd.get('nk');
        coloredSd.set('nk',on);
        ly.setStyle(on?{color:'#444',weight:2,fillColor:highlightFill,fillOpacity:0.7,opacity:1}:{color:'#444',weight:1,fillColor:'#ffffff',fillOpacity:defaultLandOpacity,opacity:1});
      });
      ly.on('mouseout',hideTT);
    }
  }); // 기본 숨김 - addTo(map) 안 함

  // 속성명: NL_NAME_1 (시도), NL_NAME_2 (시군)
  provinceNames=[...new Set(sdJson.features.map(f=>f.properties.NL_NAME_1))].sort();
  const pc=$('provinceCheckboxes');pc.innerHTML='';
  provinceNames.forEach(n=>{const l=document.createElement('label');l.innerHTML=`<input type="checkbox" value="${n}" checked> ${n}`;pc.appendChild(l);});
  selectedProvinces=new Set(provinceNames);$('provinceSelectedCount').textContent=selectedProvinces.size;

  $('btn-province-all').addEventListener('click',()=>{provinceNames.forEach(n=>selectedProvinces.add(n));pc.querySelectorAll('input').forEach(c=>c.checked=true);$('provinceSelectedCount').textContent=selectedProvinces.size;animateMapFade(updateLayers);});
  $('btn-province-none').addEventListener('click',()=>{selectedProvinces.clear();pc.querySelectorAll('input').forEach(c=>c.checked=false);$('provinceSelectedCount').textContent=0;animateMapFade(updateLayers);});
  pc.querySelectorAll('input').forEach(cb=>cb.addEventListener('change',function(){if(this.checked)selectedProvinces.add(this.value);else selectedProvinces.delete(this.value);$('provinceSelectedCount').textContent=selectedProvinces.size;animateMapFade(updateLayers);}));

  function createSdLayer(f){return L.geoJSON(sdJson,{filter:f,style:getSdStyle,onEachFeature:(ft,ly)=>{
    ly.on('click',()=>{if(dotMode)return;if(!sgVisible){toggleSdLayerColor(ly);sdBorderLayer.bringToFront();}});
    if(ft.properties?.NL_NAME_1){const n=ft.properties.NL_NAME_1;ly.on('mouseover',e=>showTT(n,e));ly.on('mousemove',e=>showTT(n,e));ly.on('mouseout',hideTT);}
  }});}

  function createSgLayer(f){return L.geoJSON(sgJson,{filter:f,style:getSgStyle,onEachFeature:(ft,ly)=>{
    ly.on('click',()=>{if(dotMode)return;if(sgVisible){toggleSgLayerColor(ly);sdBorderLayer.bringToFront();}});
    if(ft.properties?.NL_NAME_2){const n=ft.properties.NL_NAME_2;ly.on('mouseover',e=>showTT(n,e));ly.on('mousemove',e=>showTT(n,e));ly.on('mouseout',hideTT);}
  }});}

  function updateLayers(){
    if(sdLayer)map.removeLayer(sdLayer);
    if(sgLayer)map.removeLayer(sgLayer);
    if(sdBorderLayer)map.removeLayer(sdBorderLayer);
    if(skLayer)map.removeLayer(skLayer);

    const sel=Array.from(selectedProvinces);
    const ff=sel.length===0?(f=>false):(f=>sel.includes(f.properties.NL_NAME_1));

    // borderMode: 0=없애기, 1=나라(sd fill만), 2=시도(sd fill+border), 3=시군(sg)
    if(borderMode===0){
      // 없애기: 아무것도 안 그림
      sdLayer=L.geoJSON({type:'FeatureCollection',features:[]}).addTo(map);
      sgLayer=L.geoJSON({type:'FeatureCollection',features:[]});
      sdBorderLayer=L.geoJSON({type:'FeatureCollection',features:[]}).addTo(map);
    } else if(borderMode===1){
      // 나라: 남한 전체 윤곽(sk) + 나라 경계
      if(skLayer)map.removeLayer(skLayer);
      skLayer=L.geoJSON(skJson,{
        style:()=>({color:'#333',weight:parseFloat($('slider-nk').value),fillColor:'#ffffff',fillOpacity:defaultLandOpacity,opacity:1}),
        onEachFeature:(ft,ly)=>{ly.on('click',()=>{if(dotMode)return;const on=!coloredSd.get('sk');coloredSd.set('sk',on);ly.setStyle(on?{color:'#222',weight:2,fillColor:highlightFill,fillOpacity:0.7,opacity:1}:{color:'#222',weight:parseFloat($('slider-sd').value),fillColor:'#ffffff',fillOpacity:defaultLandOpacity,opacity:1});});}
      }).addTo(map);
      sdLayer=L.geoJSON({type:'FeatureCollection',features:[]}).addTo(map);
      sgLayer=L.geoJSON({type:'FeatureCollection',features:[]});
      sdBorderLayer=L.geoJSON({type:'FeatureCollection',features:[]}).addTo(map);
    } else if(borderMode===2){
      // 시도: sd fill + 시도 경계
      sdLayer=createSdLayer(ff).addTo(map);
      sgLayer=L.geoJSON({type:'FeatureCollection',features:[]});
      sdBorderLayer=L.geoJSON(sdJson,{filter:ff,style:()=>({color:'#222',weight:parseFloat($('slider-sd').value),fillOpacity:0,opacity:1}),interactive:false}).addTo(map);
      sdLayer.setStyle({fillOpacity:defaultLandOpacity,opacity:1});
      sdBorderLayer.bringToFront();
    } else {
      // 시군(3): sg + sd border
      sdLayer=createSdLayer(ff).addTo(map);
      sgLayer=createSgLayer(ff);
      sdBorderLayer=L.geoJSON(sdJson,{filter:ff,style:()=>({color:'#222',weight:parseFloat($('slider-sd').value),fillOpacity:0,opacity:1}),interactive:false}).addTo(map);
      sdBorderLayer.bringToFront();
      sdLayer.setStyle({fillOpacity:0,opacity:0.5});
      map.addLayer(sgLayer);
    }

    if(nkVisible) nkLayer.bringToBack();
    fitMapBounds();
  }
  updateLayers();

  // 경계 버튼: 없애기 → 나라 → 시도 → 시군 순환
  function updateBorderBtn(){
    const btn=$('btn-sg');
    const labels=['경계없음 →','남측 →','시도 →','시군 →'];
    const colors=['#6c757d','#17a2b8','#dc3545','#007bff'];
    btn.textContent=labels[borderMode];
    btn.style.background=colors[borderMode];
    btn.style.color='#fff';
    btn.style.borderColor=colors[borderMode];
  }
  updateBorderBtn();

  $('btn-sg').addEventListener('click',()=>{
    animateMapFade(()=>{
      borderMode=(borderMode+1)%4;
      updateBorderBtn();
      updateLayers();
    });
  });

  $('slider-sd').addEventListener('input',e=>{$('sd-value').textContent=(+e.target.value).toFixed(1);if(sdBorderLayer)sdBorderLayer.setStyle({weight:+e.target.value});if(sdBorderLayer)sdBorderLayer.bringToFront();});
  $('slider-nk').addEventListener('input',e=>{
    $('nk-value').textContent=(+e.target.value).toFixed(1);
    if(nkLayer)nkLayer.setStyle({weight:+e.target.value});
    if(skLayer)skLayer.setStyle({weight:+e.target.value});
  });
  $('slider-sg').addEventListener('input',e=>{$('sg-value').textContent=(+e.target.value).toFixed(1);if(sgLayer)sgLayer.setStyle({weight:+e.target.value});if(sdBorderLayer)sdBorderLayer.bringToFront();});
  $('btn-reset').addEventListener('click',()=>location.reload());
  $('savePng').addEventListener('click',()=>alert('저장 기능을 만들다가 계속 실패. 😢😡😵‍💫 [shift]+[win]+[s]를 이용해주세요.'));
});
});
</script>
