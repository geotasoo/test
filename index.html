<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🗺️ 세계지도 색칠하기 v1.9</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://unpkg.com/topojson@3"></script>
  <style>
    html, body { width:100%; height:100%; margin:0; padding:0; overflow:hidden; }
    body { display:flex; flex-direction:column; font-family:sans-serif; }

    #toolbar {
      background:#f8f8f8; padding:8px;
      display:flex; flex-wrap:wrap; gap:10px; align-items:center;
      border-bottom:1px solid #ddd; flex:0 0 auto;
    }

    #main-container {
      display:flex; flex:1 1 auto; overflow:hidden;
    }

    #map-wrap {
      flex:1 1 auto; overflow:hidden; position:relative;
    }
    #map { width:100%; height:100%; display:block; }

    /* ===== 사이드 패널 ===== */
    #city-panel {
      width:0; min-width:0;
      background:#fff;
      border-left:none;
      display:flex; flex-direction:column;
      overflow:hidden;
      transition: width .25s ease;
      font-size:13px;
      flex-shrink:0;
    }
    #city-panel.open {
      width:280px; min-width:280px;
      border-left:1px solid #ddd;
    }

    .panel-header { padding:12px; border-bottom:1px solid #eee; }
    .panel-header h3 { margin:0 0 10px 0; font-size:16px; }

    /* 검색창 디자인 개선 */
    .search-wrapper { position: relative; width: 100%; }
    #panel-search {
      width:100%; box-sizing:border-box; padding:8px 30px 8px 10px;
      border:1px solid #ccc; border-radius:4px; outline:none;
    }
    #btn-clear-search {
      position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
      border: none; background: #bbb; color: #fff; border-radius: 50%;
      width: 18px; height: 18px; font-size: 10px; cursor: pointer; 
      display: none; align-items: center; justify-content: center; line-height: 1;
    }
    #btn-clear-search.show { display: flex; }

    #city-list-area { flex:1; overflow-y:auto; padding:10px; }
    .continent-section { margin-bottom:15px; }
    .continent-title { font-weight:bold; margin-bottom:5px; color:#555; background:#f0f0f0; padding:4px; border-radius:3px; }
    .city-item { display:flex; align-items:center; gap:6px; margin-bottom:4px; cursor:pointer; }
    .city-item input { cursor:pointer; }

    #summary-area {
      padding:10px; border-top:1px solid #eee; background:#fafafa;
      max-height:100px; overflow-y:auto; font-size:12px;
    }

    /* 툴팁 */
    #tooltip {
      position:fixed; display:none; pointer-events:none;
      background:rgba(0,0,0,0.7); color:#fff; padding:4px 8px;
      border-radius:4px; font-size:12px; z-index:9999;
    }

    label { font-size:12px; font-weight:bold; }
    input[type="color"] { border:none; width:30px; height:24px; cursor:pointer; padding:0; background:none; }
    button { cursor:pointer; padding:4px 8px; font-size:12px; }
  </style>
</head>
<body>

<div id="toolbar">
  <label>바다</label>
  <input type="color" id="oceanColorSelect" value="#aadaff" onchange="updateOceanColor()" />
  
  <label>육지</label>
  <input type="color" id="landColorSelect" value="#ffffff" onchange="updateColors()" />
  
  <label>브러쉬</label>
  <input type="color" id="brushColor" value="#ffcc00" />
  
  <div style="height:20px; width:1px; background:#ccc; margin:0 5px;"></div>
  
  <label>선 굵기</label>
  <input type="range" id="borderWidth" min="0" max="2" step="0.1" value="0.3" oninput="updateColors()" />
  
  <label>점 크기</label>
  <input type="range" id="dotSize" min="1" max="10" step="0.5" value="3" oninput="renderCityDots()" />
  
  <label>점 색상</label>
  <input type="color" id="dotColor" value="#ff0000" onchange="renderCityDots()" />

  <div style="height:20px; width:1px; background:#ccc; margin:0 5px;"></div>
  
  <button onclick="toggleCityPanel()">🏙️ 도시 목록</button>
  <button onclick="toggleGrid()">🌐 위경선</button>
  <button id="btn-manual-add" onclick="alert('곧 구현 예정입니다!')">📍 직접 점찍기</button>
  <button onclick="saveImage()" style="background:#444; color:#fff; border:none; border-radius:3px;">💾 이미지 저장</button>
</div>

<div id="main-container">
  <div id="map-wrap">
    <svg id="map"></svg>
    <div id="tooltip"></div>
  </div>
  
  <div id="city-panel">
    <div class="panel-header">
      <h3>🏙️ 도시 선택</h3>
      <div class="search-wrapper">
        <input type="text" id="panel-search" placeholder="도시 검색 (ex. 서울, 파리...)" />
        <button id="btn-clear-search" title="검색 초기화">✕</button>
      </div>
    </div>
    <div id="city-list-area"></div>
    <div id="summary-area">선택된 도시 없음</div>
  </div>
</div>

<script>
/**
 * 1. 데이터 및 초기 변수
 */
const CITIES = [
  { name: "서울", lat: 37.5665, lng: 126.9780, continent: "아시아" },
  { name: "도쿄", lat: 35.6762, lng: 139.6503, continent: "아시아" },
  { name: "베이징", lat: 39.9042, lng: 116.4074, continent: "아시아" },
  { name: "방콕", lat: 13.7563, lng: 100.5018, continent: "아시아" },
  { name: "싱가포르", lat: 1.3521, lng: 103.8198, continent: "아시아" },
  { name: "런던", lat: 51.5074, lng: -0.1278, continent: "유럽" },
  { name: "파리", lat: 48.8566, lng: 2.3522, continent: "유럽" },
  { name: "로마", lat: 41.9028, lng: 12.4964, continent: "유럽" },
  { name: "베를린", lat: 52.5200, lng: 13.4050, continent: "유럽" },
  { name: "뉴욕", lat: 40.7128, lng: -74.0060, continent: "북미" },
  { name: "LA", lat: 34.0522, lng: -118.2437, continent: "북미" },
  { name: "토론토", lat: 43.6532, lng: -79.3832, continent: "북미" },
  { name: "시드니", lat: -33.8688, lng: 151.2093, continent: "오세아니아" },
  { name: "상파울루", lat: -23.5505, lng: -46.6333, continent: "남미" },
  { name: "카이로", lat: 30.0444, lng: 31.2357, continent: "아프리카" }
];

const selectedCities = new Set();
const countryColors = {}; 
let worldData = null;
let showGrid = false;

const svg = d3.select("#map");
const tooltip = d3.select("#tooltip");
const vw = 1000, vh = 500;
svg.attr("viewBox", `0 0 ${vw} ${vh}`);

// 무한 루프 구현을 위해 지도를 담을 두 개의 그룹
const gAll = svg.append("g").attr("class", "g-all");
const mapGroup1 = gAll.append("g").attr("class", "map-group-1");
const mapGroup2 = gAll.append("g").attr("class", "map-group-2");
const cityGroup1 = gAll.append("g").attr("class", "city-group-1");
const cityGroup2 = gAll.append("g").attr("class", "city-group-2");

const projection = d3.geoMercator()
  .scale(vw / (2 * Math.PI))
  .translate([vw / 2, vh / 1.5]);

const path = d3.geoPath().projection(projection);

/**
 * 2. 지도 초기화 및 렌더링
 */
d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json").then(data => {
  worldData = data;
  const countries = topojson.feature(data, data.objects.countries).features;

  [mapGroup1, mapGroup2].forEach((g, i) => {
    const offset = i * vw;
    
    // 국가별 Path
    g.selectAll(".country")
      .data(countries)
      .enter().append("path")
      .attr("class", "country")
      .attr("d", path)
      .attr("transform", `translate(${offset}, 0)`)
      .style("cursor", "pointer")
      .on("click", function(event, d) {
        const cId = d.id;
        const brush = document.getElementById('brushColor').value;
        countryColors[cId] = (countryColors[cId] === brush) ? null : brush;
        updateColors();
      });

    // 테두리 Mesh
    g.append("path")
      .datum(topojson.mesh(data, data.objects.countries, (a, b) => a !== b))
      .attr("class", "border-mesh")
      .attr("d", path)
      .attr("transform", `translate(${offset}, 0)`)
      .style("fill", "none")
      .style("stroke", "#666")
      .style("pointer-events", "none");

    // 위경선 (Grid)
    g.append("path")
      .datum(d3.geoGraticule())
      .attr("class", "grid-line")
      .attr("d", path)
      .attr("transform", `translate(${offset}, 0)`)
      .style("fill", "none")
      .style("stroke", "#ccc")
      .style("stroke-width", 0.5)
      .style("stroke-dasharray", "2,2")
      .style("display", "none");
  });

  updateColors();
  updateOceanColor();
  buildPanelList();
});

// 색상 및 스타일 업데이트
window.updateColors = function() {
  const landDefault = document.getElementById('landColorSelect').value;
  const strokeW = document.getElementById('borderWidth').value;

  d3.selectAll(".country")
    .style("fill", d => countryColors[d.id] || landDefault)
    .style("stroke", "#666")
    .style("stroke-width", strokeW + "px");
    
  d3.selectAll(".border-mesh")
    .style("stroke-width", strokeW + "px");
};

window.updateOceanColor = function() {
  const c = document.getElementById('oceanColorSelect').value;
  svg.style("background-color", c);
};

window.toggleGrid = function() {
  showGrid = !showGrid;
  d3.selectAll(".grid-line").style("display", showGrid ? "block" : "none");
};

/**
 * 3. 도시 렌더링 (양쪽 지도 동시 구현 핵심)
 */
window.renderCityDots = function() {
  const r = parseFloat(document.getElementById('dotSize').value);
  const color = document.getElementById('dotColor').value;
  const selected = CITIES.filter(c => selectedCities.has(c.name));

  // cityGroup1과 cityGroup2 모두에 데이터 바인딩
  [cityGroup1, cityGroup2].forEach((g, gi) => {
    const offset = gi * vw;
    
    const dots = g.selectAll("circle.city-dot")
      .data(selected, d => d.name);

    // 삭제
    dots.exit().remove();

    // 생성 및 업데이트
    dots.enter().append("circle")
      .attr("class", "city-dot")
      .merge(dots)
      .attr("cx", d => projection([d.lng, d.lat])[0] + offset)
      .attr("cy", d => projection([d.lng, d.lat])[1])
      .attr("r", r)
      .attr("fill", color)
      .attr("stroke", "#fff")
      .attr("stroke-width", Math.max(0.5, r * 0.2))
      .style("cursor", "pointer")
      .on("pointerenter", (event, d) => { 
        tooltip.style("display", "block").text(d.name); 
      })
      .on("pointermove", event => { 
        tooltip.style("transform", `translate(${event.clientX + 15}px,${event.clientY + 15}px)`); 
      })
      .on("pointerleave", () => { 
        tooltip.style("display", "none"); 
      });
  });
};

/**
 * 4. 도시 사이드 패널 및 검색 (개선됨)
 */
function toggleCityPanel() {
  document.getElementById('city-panel').classList.toggle('open');
}

const searchInput = document.getElementById('panel-search');
const clearSearchBtn = document.getElementById('btn-clear-search');

// 검색어 입력 이벤트
searchInput.addEventListener('input', e => {
  const val = e.target.value;
  clearSearchBtn.classList.toggle('show', val.length > 0);
  buildPanelList(val);
});

// 검색 초기화 (목록으로 돌아가기) 버튼 이벤트
clearSearchBtn.addEventListener('click', () => {
  searchInput.value = '';
  clearSearchBtn.classList.remove('show');
  buildPanelList('');
  searchInput.focus();
});

function buildPanelList(filter = "") {
  const container = document.getElementById('city-list-area');
  container.innerHTML = "";
  
  const filtered = CITIES.filter(c => c.name.includes(filter) || c.continent.includes(filter));
  const groups = d3.group(filtered, d => d.continent);

  groups.forEach((cities, continent) => {
    const sec = document.createElement('div');
    sec.className = 'continent-section';
    sec.innerHTML = `<div class="continent-title">${continent}</div>`;
    
    cities.forEach(c => {
      const item = document.createElement('label');
      item.className = 'city-item';
      const chk = document.createElement('input');
      chk.type = 'checkbox';
      chk.checked = selectedCities.has(c.name);
      chk.onchange = () => {
        if(chk.checked) selectedCities.add(c.name);
        else selectedCities.delete(c.name);
        updateSummary();
        renderCityDots();
      };
      item.appendChild(chk);
      item.appendChild(document.createTextNode(c.name));
      sec.appendChild(item);
    });
    container.appendChild(sec);
  });
}

function updateSummary() {
  const area = document.getElementById('summary-area');
  if(selectedCities.size === 0) {
    area.innerText = "선택된 도시 없음";
  } else {
    area.innerText = "선택: " + Array.from(selectedCities).join(", ");
  }
}

/**
 * 5. 줌(Zoom) & 드래그
 */
const zoomBehavior = d3.zoom()
  .scaleExtent([1, 8])
  .on("zoom", (event) => {
    const { x, y, k } = event.transform;
    // 무한 루프를 위해 x좌표 계산
    let tx = x % (vw * k);
    gAll.attr("transform", `translate(${tx}, ${y}) scale(${k})`);
  });

svg.call(zoomBehavior);

/**
 * 6. 이미지 저장
 */
window.saveImage = function() {
  const svgNode = document.getElementById('map');
  const clone = svgNode.cloneNode(true);
  
  // 클론된 요소에 배경색 주입
  clone.style.backgroundColor = document.getElementById('oceanColorSelect').value;
  
  const url = URL.createObjectURL(new Blob([new XMLSerializer().serializeToString(clone)],{type:'image/svg+xml;charset=utf-8'}));
  const img = new Image();
  img.onload = () => {
    const canvas = document.createElement('canvas');
    canvas.width = vw * 2; canvas.height = vh * 2; // 고해상도
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = document.getElementById('oceanColorSelect').value;
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(img,0,0,canvas.width,canvas.height);
    
    const link = document.createElement('a');
    link.href = canvas.toDataURL("image/png");
    link.download = 'world-map-v1.9.png';
    link.click();
  };
  img.src = url;
};

</script>
</body>
</html>
