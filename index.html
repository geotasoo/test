    html, body { height:100vh; margin:0; padding:0; background:#ffffff; }

    #map { flex:1; height:70%; margin:0; padding:0; background:#ffffff; }
    header {

      font-size:18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header a {
      color: #fff;
      font-size: 15px;
      text-decoration: none;
    }
    header span {
      cursor: pointer;
    }
    #toolbar { background:#f8f8f8; padding:8px; display:flex; flex-wrap:wrap; gap:12px; align-items:center; border-bottom:1px solid #ddd; font-family:sans-serif; }
    #toolbar button, #toolbar select, #toolbar input[type=color] { border:1px solid #ccc; background:white; border-radius:4px; padding:4px 8px; cursor:pointer; transition:background .2s, color .2s; }
    #btn-sg.mode-sg { background:#007bff; color:#fff; font-weight:bold; border-color:#007bff; }
    #btn-sg.mode-sg:hover { background:#0056b3; }
    #btn-sg.mode-sd { background:#dc3545; color:#fff; font-weight:bold; border-color:#dc3545; }
    #btn-sg.mode-sd:hover { background:#c82333; }
    
    /* 점찍기 버튼 스타일 */
    .tb-btn.primary { background:#1a73e8; color:#fff; border-color:#1a73e8; }
    .tb-btn.primary:hover { background:#1557b0; }
    .tb-btn.primary.active { background:#0d47a1; }
    
    #toolbar .palette-box { width:20px; height:20px; border:1px solid #aaa; cursor:pointer; transition:transform .15s, border-color .15s; }
    #toolbar .palette-box:hover { transform:scale(1.2); border-color:#333; }
    #toolbar label { font-size:0.9rem; display:flex; align-items:center; gap:2px; }
    #toolbar span.value { min-width:20px; text-align:right; display:inline-block; }
    #toolbar input[type=range] { width:100px; }
    .leaflet-control-zoom { display:none; }
    #map.animated-fade { 
      transition: opacity 0.4s cubic-bezier(.4,0,.2,1); 
      opacity: 0.25; 
      pointer-events: none;
    }
    #map.animated-fade-in {
      transition: opacity 0.4s cubic-bezier(.4,0,.2,1); 
      opacity: 1;
      pointer-events: auto;
    }
    .dropdown {
      position: relative;
      display: inline-block;
      min-width: 100px;
      z-index: 1000;
    }
    .dropdown-btn {
      min-width: 110px;
      display: flex;
      align-items: center;
      gap: 6px;
      border:1px solid #ccc;
      border-radius: 4px;
      background: white;
      cursor: pointer;
      padding: 4px 12px;
      font-size: 1em;
      font-family: inherit;
    }
    .dropdown-btn span.count {
      color: #444;
      font-size: 0.97em;
      background: #e6f1fa;
      border-radius: 8px;
      padding: 2px 8px;
      margin-left: 4px;
    }
    .dropdown-content {
      display: none;
      position: absolute;
      top: 120%;
      left: 0;
      min-width: 190px;
      max-height: 310px;
      overflow-y: auto;
      background: #fff;
      border: 1.5px solid #bbb;
      border-radius: 7px;
      box-shadow: 0 6px 22px rgba(0,0,0,0.13);
      padding: 10px 10px 10px 10px;
      z-index: 9999;
      font-size: 0.97em;
      animation: dropdownOpen .19s cubic-bezier(.4,0,.2,1);
    }
    @keyframes dropdownOpen {
      from { opacity: 0; transform: translateY(-8px);}
      to   { opacity: 1; transform: translateY(0);}
    }
    .dropdown.open .dropdown-content { display: block; }
    .dropdown-content label { display: flex; align-items: center; margin-bottom: 5px; cursor: pointer; }
    .dropdown-content input[type=checkbox] { margin-right: 6px; }
    .dropdown-content .dropdown-actions {
      display: flex; gap: 8px; margin-bottom: 8px; margin-top: -2px;
    }
    .dropdown-content .dropdown-actions button {
      font-size: 0.97em;
      padding: 2px 10px;
      border:1px solid #ccd;
      border-radius: 3px;
      background: #f4f7fa;
      cursor:pointer;
      transition:background .13s;
    }
    .dropdown-content .dropdown-actions button:hover {
      background: #c5e1f8;
    }
    
    /* 사이드 패널 스타일 */
    .side-panel {
      position: fixed;
      top: 95px;
      width: 340px;
      height: calc(100vh - 95px);
      background: #fff;
      box-shadow: -2px 0 8px rgba(0,0,0,0.1);
      transition: transform 0.3s ease, opacity 0.3s ease;
      z-index: 10000;
      display: flex;
      flex-direction: column;
      font-size: 13px;
    }
    
    /* 도시 목록 패널 (왼쪽) */
    #city-panel {
      left: 0;
      border-right: 2px solid #ddd;
      transform: translateX(-100%);
      opacity: 0;
    }
    #city-panel.open {
      transform: translateX(0);
      opacity: 1;
    }
    
    /* 내가 찍은 점 패널 (오른쪽) */
    #pin-panel {
      right: 0;
      border-left: 2px solid #ddd;
      transform: translateX(100%);
      opacity: 0;
    }
    #pin-panel.open {
      transform: translateX(0);
      opacity: 1;
    }
    
    .panel-header {
      background: #f5f5f5;
      padding: 12px;
      border-bottom: 1px solid #ddd;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: bold;
    }
    .panel-header .ph-right {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .panel-header .ph-right button {
      padding: 4px 8px;
      font-size: 12px;
      border: 1px solid #ccc;
      border-radius: 3px;
      background: #fff;
      cursor: pointer;
    }
    .panel-header .ph-right button:hover {
      background: #f0f0f0;
    }
    .panel-close {
      background: #e0e0e0;
      border: none;
      border-radius: 3px;
      padding: 4px 8px;
      cursor: pointer;
      font-size: 16px;
    }
    .panel-close:hover {
      background: #d0d0d0;
    }
    .panel-search-wrap {
      padding: 10px;
      border-bottom: 1px solid #eee;
    }
    .panel-search-wrap input {
      width: 100%;
      padding: 6px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
      box-sizing: border-box;
    }
    .panel-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }
    .sido-label {
      background: #f0f0f0;
      padding: 8px;
      margin-bottom: 5px;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: bold;
    }
    .sido-label:hover {

    }
    .city-row {
      padding: 6px 12px;
      display: flex;
      align-items: center;
      gap: 8px;

    }

    }
  </style>
</head>

<script>
  (function () {
    const links = document.querySelectorAll('#iconLinks a');
    const tooltip = document.getElementById('linkTooltip');

    links.forEach(link => {
      link.addEventListener('pointerenter', () => {
        tooltip.textContent = link.dataset.tip || '';
        tooltip.style.display = 'block';
      });

      link.addEventListener('pointermove', (e) => {
        const vw = window.innerWidth;
        const vh = window.innerHeight;
        let x = e.clientX - tooltip.offsetWidth - 10;
        let y = e.clientY + 20;
        if (x < 0) x = e.clientX + 15;
        if (x + tooltip.offsetWidth > vw) x = Math.max(5, vw - tooltip.offsetWidth - 5);
        if (y + tooltip.offsetHeight > vh) y = e.clientY - tooltip.offsetHeight - 12;
        x = Math.max(5, x);
        y = Math.max(5, y);
        tooltip.style.left = x + 'px';
        tooltip.style.top  = y + 'px';
      });

      link.addEventListener('pointerleave', () => {
        tooltip.style.display = 'none';
      });
    });
  })();
</script>

      }
    });

    // --- 해양 영역(백그라운드 흰색) ---
    map.createPane('seaPane');
    map.getPane('seaPane').style.zIndex = 100;
    L.rectangle([[-90, -180], [90, 180]], {
      pane: 'seaPane',
      interactive: false,
      fillColor: '#ffffff',
      fillOpacity: 1,
      stroke: false
    }).addTo(map);

    // ========== 점찍기 패널 로직 ==========
    function openDotPanel() {
      dotPanelOpen = true;
      document.getElementById('city-panel').classList.add('open');
      document.getElementById('pin-panel').classList.add('open');
      document.getElementById('btn-dot-panel').classList.add('active');
      buildDotList('');
    }
    
    function closeDotPanel() {
      dotPanelOpen = false;
      document.getElementById('city-panel').classList.remove('open');
      document.getElementById('pin-panel').classList.remove('open');
      document.getElementById('btn-dot-panel').classList.remove('active');
      // 직접 점찍기 모드도 끄기
      if (manualPinMode) {
        document.getElementById('btn-manual-pin-mode').click();
      }
    }
    
    document.getElementById('btn-dot-panel').addEventListener('click', () => {
      if (dotPanelOpen) closeDotPanel();
      else openDotPanel();
    });
    
    document.getElementById('btn-city-panel-close').addEventListener('click', closeDotPanel);
    document.getElementById('btn-pin-panel-close').addEventListener('click', closeDotPanel);
    
    // 전체 선택/해제 버튼
    document.getElementById('btn-select-all-cities').addEventListener('click', () => {
      KOREA_CITIES.forEach(c => selectedCities.add(c.name));
      updateDotSummary();
      renderDots();
      buildDotList(document.getElementById('dot-search').value.toLowerCase());
    });
    
    document.getElementById('btn-deselect-all-cities').addEventListener('click', () => {
      selectedCities.clear();
      updateDotSummary();
      renderDots();
      buildDotList(document.getElementById('dot-search').value.toLowerCase());
    });
    
    // 직접 점찍기 모드
    document.getElementById('btn-manual-pin-mode').addEventListener('click', () => {
      manualPinMode = !manualPinMode;
      const btn = document.getElementById('btn-manual-pin-mode');
      if (manualPinMode) {
        btn.style.background = '#1a73e8';
        btn.style.color = 'white';
        btn.textContent = '🖱️ 직접 점찍기 ON (지도 클릭)';
        map.getContainer().style.cursor = 'crosshair';
      } else {
        btn.style.background = 'white';
        btn.style.color = '#1a73e8';
        btn.textContent = '🖱️ 직접 점찍기 (클릭)';
        map.getContainer().style.cursor = '';
      }
    });
    
    // 지도 클릭 이벤트
    map.on('click', function(e) {
      if (!manualPinMode) return;
      
      const {lat, lng} = e.latlng;
      const id = Date.now();
      manualPins.push({lat, lng, id});
      
      renderDots();
      updateManualPinsList();
    });
    
    function updateManualPinsList() {
      const list = document.getElementById('manual-pins-list');
      if (manualPins.length === 0) {
        list.innerHTML = '';
        return;
      }
      
      list.innerHTML = `<div style="font-size:11px; color:#666; margin-bottom:4px;">내가 찍은 점 (${manualPins.length}개)</div>`;
      
      manualPins.forEach((pin, idx) => {
        const row = document.createElement('div');
        row.style.cssText = 'display:flex; justify-content:space-between; align-items:center; padding:4px; font-size:12px; border-bottom:1px solid #f0f0f0;';
        
        const label = document.createElement('span');
        label.textContent = `${idx + 1}번 점 (${pin.lat.toFixed(4)}, ${pin.lng.toFixed(4)})`;
        label.style.color = '#555';
        
        const delBtn = document.createElement('button');
        delBtn.textContent = '✕';
        delBtn.style.cssText = 'border:none; background:#ff5252; color:white; border-radius:3px; padding:2px 6px; cursor:pointer; font-size:11px;';
        delBtn.addEventListener('click', () => {
          manualPins = manualPins.filter(p => p.id !== pin.id);
          renderDots();
          updateManualPinsList();
        });
        
        row.appendChild(label);
        row.appendChild(delBtn);
        list.appendChild(row);
      });
    }
    
    // 검색 기능
    document.getElementById('dot-search').addEventListener('input', e => {
      buildDotList(e.target.value.toLowerCase());
    });
    
    function updateDotSummary() {
      const summary = document.getElementById('dot-summary');
      if (selectedCities.size === 0) {
        summary.textContent = '선택된 도시 없음';
        summary.style.color = '#aaa';
      } else {
        const names = [...selectedCities].join(', ');
        summary.textContent = `✔ ${selectedCities.size}개 선택: ${names}`;
        summary.style.color = '#1a73e8';
      }
    }
    
    function buildDotList(searchTerm) {
      const list = document.getElementById('dot-list');
      list.innerHTML = '';
      
      // 시도별 그룹핑
      SIDO_ORDER.forEach(sido => {
        const cities = KOREA_CITIES.filter(c => c.sido === sido);
        if (cities.length === 0) return;
        
        const filtered = cities.filter(c => c.name.toLowerCase().includes(searchTerm));
        if (filtered.length === 0) return;
        
        const isCollapsed = sidoCollapsed.has(sido);
        const selectedCount = filtered.filter(c => selectedCities.has(c.name)).length;
        
        // 시도 레이블
        const label = document.createElement('div');
        label.className = 'sido-label';
        label.innerHTML = `
          <span>${sido}</span>
          <span style="font-size:11px; color:#666;">
            ${selectedCount > 0 ? `✔${selectedCount} ` : ''}
            ${isCollapsed ? '▶' : '▼'}
          </span>
        `;
        
        label.addEventListener('click', (e) => {
          // 버튼 클릭 시 이벤트 전파 방지
          if (e.target.tagName === 'BUTTON') return;
          
          if (sidoCollapsed.has(sido)) {
            sidoCollapsed.delete(sido);
          } else {
            sidoCollapsed.add(sido);
          }
          buildDotList(searchTerm);
        });
        
        list.appendChild(label);
        
        // 카테고리별 전체 선택/해제 버튼 (펼쳐진 경우에만)
        if (!isCollapsed) {
          const btnWrap = document.createElement('div');
          btnWrap.style.cssText = 'display:flex; gap:6px; padding:4px 12px 8px; border-bottom:1px solid #f0f0f0;';
          
          const selectAllBtn = document.createElement('button');
          selectAllBtn.textContent = '전체선택';
          selectAllBtn.style.cssText = 'flex:1; padding:4px; font-size:11px; border:1px solid #ddd; border-radius:3px; background:#f9f9f9; cursor:pointer;';
          selectAllBtn.addEventListener('click', () => {
            filtered.forEach(c => selectedCities.add(c.name));
            updateDotSummary();
            renderDots();
            buildDotList(searchTerm);
          });
          
          const deselectAllBtn = document.createElement('button');
          deselectAllBtn.textContent = '전체해제';
          deselectAllBtn.style.cssText = 'flex:1; padding:4px; font-size:11px; border:1px solid #ddd; border-radius:3px; background:#f9f9f9; cursor:pointer;';
          deselectAllBtn.addEventListener('click', () => {
            filtered.forEach(c => selectedCities.delete(c.name));
            updateDotSummary();
            renderDots();
            buildDotList(searchTerm);
          });
          
          btnWrap.appendChild(selectAllBtn);
          btnWrap.appendChild(deselectAllBtn);
          list.appendChild(btnWrap);
          
          // 도시 목록
          filtered.forEach(city => {
            const row = document.createElement('div');
            row.className = 'city-row';
            
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.checked = selectedCities.has(city.name);
            
            const nameSpan = document.createElement('span');
            nameSpan.className = 'city-name' + (selectedCities.has(city.name) ? ' checked' : '');
            nameSpan.textContent = city.name;
            
            const toggle = () => {
              if (selectedCities.has(city.name)) {
                selectedCities.delete(city.name);
                checkbox.checked = false;
                nameSpan.classList.remove('checked');
              } else {
                selectedCities.add(city.name);
                checkbox.checked = true;
                nameSpan.classList.add('checked');
              }
              updateDotSummary();
              renderDots();
              buildDotList(searchTerm);
            };
            
            checkbox.addEventListener('change', toggle);
            nameSpan.addEventListener('click', toggle);
            
            row.appendChild(checkbox);
            row.appendChild(nameSpan);
            list.appendChild(row);
          });
        }
      });
      
      updateDotSummary();
    }
    
    function renderDots() {
      // 기존 마커 제거
      dotMarkers.forEach(marker => map.removeLayer(marker));
      dotMarkers = [];
      
      const radius = parseFloat(document.getElementById('dotSize').value);
      const color = document.getElementById('dotColor').value;
      const useStroke = document.getElementById('dotStroke').checked;
      
      // 선택된 도시 렌더
      const selected = KOREA_CITIES.filter(c => selectedCities.has(c.name));
      
      selected.forEach(city => {
        const marker = L.circleMarker([city.lat, city.lng], {
          radius: radius,
          fillColor: color,
          color: useStroke ? '#fff' : 'none',
          weight: useStroke ? Math.max(0.5, radius * 0.2) : 0,
          fillOpacity: 1,
          pane: 'markerPane'
        }).addTo(map);
        
        marker.on('mouseover', e => showCustomTooltip(city.name, e));
        marker.on('mousemove', e => showCustomTooltip(city.name, e));
        marker.on('mouseout', hideCustomTooltip);
        
        dotMarkers.push(marker);
      });
      
      // 직접 찍은 점 렌더
      manualPins.forEach((pin, idx) => {
        const marker = L.circleMarker([pin.lat, pin.lng], {
          radius: radius,
          fillColor: color,
          color: useStroke ? '#fff' : 'none',
          weight: useStroke ? Math.max(0.5, radius * 0.2) : 0,
          fillOpacity: 1,
          pane: 'markerPane'
        }).addTo(map);
        
        marker.on('mouseover', e => showCustomTooltip(`내가 찍은 점 ${idx + 1}`, e));
        marker.on('mousemove', e => showCustomTooltip(`내가 찍은 점 ${idx + 1}`, e));
        marker.on('mouseout', hideCustomTooltip);
        
        dotMarkers.push(marker);
      });
    }

    // --- 스타일 함수 ---
    function getSdStyle(layer) {
      const id = layer._leaflet_id;
      if (coloredSd.get(id)) {
        return {
          color: '#444',
          weight: 2,
          fillColor: highlightFill,
          fillOpacity: 0.7,
          opacity: 1
        };
      } else {
        return {
          ...defaultStyle.sd
        };
      }
    }
    function getSgStyle(layer) {
      const id = layer._leaflet_id;
      if (coloredSg.get(id)) {
        return {
          color: '#444',
          weight: 1,
          fillColor: highlightFill,
          fillOpacity: 0.7,
          opacity: 1
        };
      } else {
        return {
          ...defaultStyle.sg
        };
      }
    }

    function toggleSdLayerColor(layer) {
      const id = layer._leaflet_id;
      const on = !coloredSd.get(id);
      coloredSd.set(id, on);
      layer.setStyle(getSdStyle(layer));
    }
    function toggleSgLayerColor(layer) {
      const id = layer._leaflet_id;
      const on = !coloredSg.get(id);
      coloredSg.set(id, on);
      layer.setStyle(getSgStyle(layer));
    }

    function resetSdLayerColors() {
      coloredSd.clear();
      sdLayer && sdLayer.eachLayer(layer => layer.setStyle(getSdStyle(layer)));
    }
    function resetSgLayerColors() {
      coloredSg.clear();
      sgLayer && sgLayer.eachLayer(layer => layer.setStyle(getSgStyle(layer)));
    }

    function animateMapFade(cb) {
      const mapDiv = document.getElementById('map');
      mapDiv.classList.add('animated-fade');
      setTimeout(() => {
        cb();
        mapDiv.classList.remove('animated-fade');
        mapDiv.classList.add('animated-fade-in');
        setTimeout(() => mapDiv.classList.remove('animated-fade-in'), 400);
      }, 300);
    }

    // --- 시도 드롭다운 기능 ---
    function updateProvinceSelectedCount() {
      document.getElementById('provinceSelectedCount').textContent = selectedProvinces.size;
    }

    function closeProvinceDropdown() {
      document.getElementById('provinceDropdown').classList.remove('open');
    }
    function openProvinceDropdown() {
      document.getElementById('provinceDropdown').classList.add('open');
    }

    document.addEventListener('click', function(e) {
      const dropdown = document.getElementById('provinceDropdown');
      if (!dropdown.contains(e.target)) {
        closeProvinceDropdown();
      }
    });

    document.getElementById('provinceDropdownBtn').addEventListener('click', function(e) {
      e.stopPropagation();
      const dd = document.getElementById('provinceDropdown');
      if (dd.classList.contains('open')) {
        closeProvinceDropdown();
      } else {
        openProvinceDropdown();
      }
    });

    // --- GeoJSON fetch 및 시도 체크박스 동적 생성 ---
    Promise.all([
      fetch('q_sd.json').then(r => r.json()),
      fetch('q_sg.json').then(r => r.json())
    ]).then(([sdJson, sgJson]) => {
      provinceNames = [...new Set(sdJson.features.map(f => f.properties.CTP_KOR_NM))];
      const provinceCheckboxesDiv = document.getElementById('provinceCheckboxes');

      provinceCheckboxesDiv.innerHTML = '';
      provinceNames.forEach(name => {
        const id = 'prov-' + name;
        const label = document.createElement('label');
        label.innerHTML = `<input type="checkbox" id="${id}" value="${name}"> ${name}`;
        provinceCheckboxesDiv.appendChild(label);
      });

      selectedProvinces = new Set(provinceNames);
      provinceCheckboxesDiv.querySelectorAll('input[type=checkbox]').forEach(cb => cb.checked = true);
      updateProvinceSelectedCount();

      document.getElementById('btn-province-all').addEventListener('click', () => {
        provinceNames.forEach(name => selectedProvinces.add(name));
        provinceCheckboxesDiv.querySelectorAll('input[type=checkbox]').forEach(cb => cb.checked = true);
        updateProvinceSelectedCount();
        animateMapFade(updateLayers);
      });
      document.getElementById('btn-province-none').addEventListener('click', () => {
        selectedProvinces.clear();
        provinceCheckboxesDiv.querySelectorAll('input[type=checkbox]').forEach(cb => cb.checked = false);
        updateProvinceSelectedCount();
        animateMapFade(updateLayers);
      });

      provinceCheckboxesDiv.querySelectorAll('input[type=checkbox]').forEach(checkbox => {
        checkbox.addEventListener('change', function() {
          if (this.checked) selectedProvinces.add(this.value);
          else selectedProvinces.delete(this.value);
          updateProvinceSelectedCount();
          animateMapFade(updateLayers);
        });
      });

      function createSdLayer(filterFunc) {
        return L.geoJSON(sdJson, {
          filter: filterFunc,
          style: getSdStyle,
          onEachFeature: (feature, layer) => {
            layer.on('click', () => {
              if (!sgVisible) {
                toggleSdLayerColor(layer);
                sdBorderLayer.bringToFront();
              }
            });
            if (feature.properties && feature.properties.CTP_KOR_NM) {
              const name = feature.properties.CTP_KOR_NM;
              layer.on('mouseover', e => showCustomTooltip(name, e));
              layer.on('mousemove', e => showCustomTooltip(name, e));
              layer.on('mouseout', hideCustomTooltip);
            }
          }
        });
      }
      function createSgLayer(filterFunc) {
        return L.geoJSON(sgJson, {
          filter: filterFunc,
          style: getSgStyle,
          onEachFeature: (feature, layer) => {
            layer.on('click', () => {
              if (sgVisible) {
                toggleSgLayerColor(layer);
                sdBorderLayer.bringToFront();
              }
            });
            if (feature.properties && feature.properties.SIG_KOR_NM) {
              const name = feature.properties.SIG_KOR_NM;
              layer.on('mouseover', e => showCustomTooltip(name, e));
              layer.on('mousemove', e => showCustomTooltip(name, e));
              layer.on('mouseout', hideCustomTooltip);
            }
          }
        });
      }

      function updateLayers() {
        if (sdLayer) { map.removeLayer(sdLayer); }
        if (sgLayer) { map.removeLayer(sgLayer); }
        if (sdBorderLayer) { map.removeLayer(sdBorderLayer); }

        const selected = Array.from(selectedProvinces);
        let sdFilter = null, sgFilter = null;

        if (selected.length === 0) {
          sdFilter = f => false;
          sgFilter = f => false;
        } else {
          sdFilter = f => selected.includes(f.properties.CTP_KOR_NM);
          sgFilter = f => selected.includes(f.properties.CTP_KOR_NM);
        }

        sdLayer = createSdLayer(sdFilter).addTo(map);
        sgLayer = createSgLayer(sgFilter);

        sdBorderLayer = L.geoJSON(sdJson, {
          filter: sdFilter,
          style: () => ({
            color: '#222',
            weight: parseFloat(document.getElementById('slider-sd').value),
            fillOpacity: 0,
            opacity: 1
          }),
          interactive: false
        }).addTo(map);
        sdBorderLayer.bringToFront();

        if (sgVisible) {
          sdLayer.setStyle({ fillOpacity: 0, opacity: 0.5 });
          map.addLayer(sgLayer);
        } else {
          map.removeLayer(sgLayer);
          sdLayer.setStyle({ fillOpacity: defaultLandOpacity, opacity: 1 });
        }

        let boundsGroup = [sdLayer, sdBorderLayer];
        if (sgVisible) boundsGroup.push(sgLayer);
        try {
          map.fitBounds(L.featureGroup(boundsGroup).getBounds(), { padding: [20, 20] });
        } catch(e) {}
      }

      updateLayers();

      document.getElementById('btn-sg').addEventListener('click', () => {
        animateMapFade(() => {
          sgVisible = !sgVisible;
          const btn = document.getElementById('btn-sg');
          if (sgVisible) {
            btn.textContent = '시군';
            btn.classList.add('mode-sg');
            btn.classList.remove('mode-sd');
          } else {
            btn.textContent = '시도';
            btn.classList.add('mode-sd');
            btn.classList.remove('mode-sg');
          }
          updateLayers();
        });
      });

      document.getElementById('slider-sd').addEventListener('input', e => {
        const w = +e.target.value;
        document.getElementById('sd-value').textContent = w.toFixed(1);
        sdBorderLayer.setStyle({ weight: w });
        sdBorderLayer.bringToFront();
      });
      document.getElementById('slider-sg').addEventListener('input', e => {
        const w = +e.target.value;
        document.getElementById('sg-value').textContent = w.toFixed(1);
        sgLayer.setStyle({ weight: w });
        sdBorderLayer.bringToFront();
      });

      document.getElementById('btn-reset').addEventListener('click', () => location.reload());
      document.getElementById('savePng').addEventListener('click', () => alert('저장 기능을 만들다가 계속 실패. 😢😡😵‍💫 [shift]+[win]+[s]를 이용해주세요.'));
    });
    }); // end of window.onload
  </script>
