<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🗺️ 세계지도 색칠하기</title>
  <style>
    html, body { width:100%; height:100%; margin:0; padding:0; overflow:hidden; }
    body { display:flex; flex-direction:column; font-family:sans-serif; }

    #toolbar {
      background:#f8f8f8; padding:8px;
      display:flex; flex-wrap:wrap; gap:10px; align-items:center;
      border-bottom:1px solid #ddd; flex:0 0 auto;
    }

    #main-container {
      display:flex; flex:1 1 auto; overflow:hidden;
    }

    #map-wrap {
      flex:1 1 auto; overflow:hidden; position:relative;
    }
    #map { width:100%; height:100%; display:block; }

    /* ===== 사이드 패널 ===== */
    #city-panel {
      width:0; min-width:0;
      background:#fff;
      border-left:none;
      display:flex; flex-direction:column;
      overflow:hidden;
      transition: width .25s ease, min-width .25s ease, border-color .25s;
      font-size:13px;
      flex-shrink:0;
    }
    #city-panel.open {
      width:230px; min-width:230px;
      border-left:1px solid #ddd;
    }

    #panel-header {
      padding:9px 12px 6px;
      font-weight:bold; font-size:13px;
      border-bottom:1px solid #eee;
      display:flex; justify-content:space-between; align-items:center;
      flex-shrink:0; background:#f8f8f8;
    }
    #panel-header .ph-right { display:flex; gap:6px; align-items:center; }
    #panel-header button {
      font-size:11px; padding:2px 8px;
      border:1px solid #bbb; border-radius:4px;
      background:#fff; cursor:pointer;
    }
    #panel-header button:hover { background:#f0f0f0; }

    #panel-search-wrap {
      flex-shrink:0;
      display:flex; align-items:center;
      border-bottom:1px solid #eee;
      background:#fafafa;
    }
    #panel-search {
      flex:1; padding:6px 10px;
      border:none; font-size:12px; outline:none;
      background:transparent;
    }
    #panel-search:focus { background:#fff; }
    #btn-search-clear {
      display:none;
      padding:4px 10px; margin-right:4px;
      font-size:11px; color:#1a73e8;
      cursor:pointer; white-space:nowrap;
      border:1px solid #aac; border-radius:4px;
      background:#e8f0fe;
    }
    #btn-search-clear:hover { background:#c5d8fd; }

    /* 선택된 도시 요약 */
    #panel-selected-summary {
      flex-shrink:0;
      padding:5px 10px;
      font-size:11px; color:#555;
      border-bottom:1px solid #eee;
      background:#f0f4ff;
      min-height:22px;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }

    #panel-list {
      overflow-y:auto; flex:1 1 auto;
    }

    .continent-label {
      padding:5px 10px;
      background:#efefef;
      font-size:11px; font-weight:bold; color:#555;
      position:sticky; top:0; z-index:1;
      letter-spacing:.5px;
    }
    .city-row {
      display:flex; align-items:center; gap:7px;
      padding:5px 10px; cursor:pointer;
      transition:background .1s;
      border-bottom:1px solid #f5f5f5;
    }
    .city-row:hover { background:#f0f4ff; }
    .city-row input[type=checkbox] { cursor:pointer; flex-shrink:0; margin:0; }
    .city-row .city-name { flex:1; font-size:13px; line-height:1.3; }
    .city-row .city-name.checked { font-weight:bold; color:#1a73e8; }
    .city-row .del-btn {
      color:#ddd; font-size:12px; cursor:pointer;
      padding:0 2px; line-height:1; flex-shrink:0;
    }
    .city-row .del-btn:hover { color:#e53935; }

    .no-result {
      padding:20px; text-align:center;
      color:#bbb; font-size:12px;
    }

    /* ===== 핀 패널 (그냥 내가 점찍기) - city-panel과 동일 디자인 ===== */
    #pin-panel {
      width:0; min-width:0;
      background:#fff;
      border-left:none;
      display:flex; flex-direction:column;
      overflow:hidden;
      transition: width .25s ease, min-width .25s ease;
      font-size:13px;
      flex-shrink:0;
    }
    #pin-panel.open {
      width:230px; min-width:230px;
      border-left:1px solid #ddd;
    }
    #pin-panel-header {
      padding:9px 12px 6px;
      font-weight:bold; font-size:13px;
      border-bottom:1px solid #eee;
      display:flex; justify-content:space-between; align-items:center;
      flex-shrink:0; background:#f8f8f8;
    }
    #pin-panel-header .ph-right { display:flex; gap:6px; align-items:center; }
    #pin-panel-header button {
      font-size:11px; padding:2px 8px;
      border:1px solid #bbb; border-radius:4px;
      background:#fff; cursor:pointer;
    }
    #pin-panel-header button:hover { background:#f0f0f0; }
    #pin-selected-summary {
      flex-shrink:0;
      padding:5px 10px;
      font-size:11px;
      border-bottom:1px solid #eee;
      background:#f0f4ff;
      min-height:22px;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    #pin-list {
      overflow-y:auto; flex:1 1 auto;
    }
    .pin-empty {
      padding:20px; text-align:center;
      color:#bbb; font-size:12px; line-height:1.8;
    }

    /* 커스텀 툴팁 */
    #tooltip {
      position:fixed; display:none;
      padding:4px 8px; font-size:12px;
      color:#fff; background:rgba(0,0,0,.8);
      border-radius:4px; pointer-events:none;
      z-index:9999; white-space:nowrap; will-change:transform;
    }

    .country { cursor:pointer; stroke:#666; stroke-width:0.3px; }
    .selected { stroke:#333; }
    .labels {
      font-size:10px; fill:#222; pointer-events:none;
      paint-order: stroke fill;
      stroke: #fff;
      stroke-width: 2.5px;
      stroke-linejoin: round;
    }
    .equator-line { fill:none; stroke:red; stroke-width:0.3px; }
    .grid-line { stroke:#ccc; stroke-width:0.5px; stroke-dasharray:2 2; fill:none; }
    .palette-box {
      width:20px; height:20px; border:1px solid #aaa; cursor:pointer;
      transition:transform .15s, border-color .15s;
    }
    .palette-box:hover { transform:scale(1.2); border-color:#333; }
    header span { cursor:pointer; }
  </style>
</head>
<body>

<header style="background:pink;color:#fff;padding:10px;font-size:18px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;">

    <a href="https://geotasoo.tistory.com/entry/%EC%9A%B0%EB%A6%AC%EB%82%98%EB%9D%BC-%EC%A7%80%EB%8F%84-%EC%83%89%EC%B9%A0%ED%95%98%EA%B8%B0-%EC%9B%B9%ED%8E%98%EC%9D%B4%EC%A7%80" target="_blank" data-tip="우리나라 지도 색칠하기" style="color:#fff;font-size:18px;text-decoration:none;">🐯</a>
    <div id="linkTooltip" style="display:none;position:fixed;background:rgba(0,0,0,.8);color:#fff;font-size:12px;padding:4px 6px;border-radius:4px;white-space:nowrap;pointer-events:none;z-index:9999;"></div>
  </div>
</header>

<script>
  document.querySelectorAll('#iconLinks a').forEach(link => {
    const tip = document.getElementById('linkTooltip');
    link.addEventListener('pointerenter', () => { tip.textContent = link.dataset.tip; tip.style.display = 'block'; });
    link.addEventListener('pointermove', e => { tip.style.left = (e.clientX - tip.offsetWidth - 10) + 'px'; tip.style.top = (e.clientY + 20) + 'px'; });
    link.addEventListener('pointerleave', () => { tip.style.display = 'none'; });
  });
</script>

<div id="toolbar">
  <label>색상: <input type="color" id="colorPicker" value="#FFD700"></label>

  <label>도시 점 크기:

    <span id="dotSizeValue">5px</span>
  </label>
  <label>점 색상: <input type="color" id="dotColor" value="#e53935"></label>

  <button id="btn-dot-panel"
    style="background:#e8f0fe;border:1px solid #aac;border-radius:4px;padding:5px 11px;cursor:pointer;font-size:13px;font-weight:500;">
    📍 점찍기
  </button>
  <button id="btn-manual-clear"
    style="display:none;background:#fff3e0;border:1px solid #f5a623;border-radius:4px;padding:5px 11px;cursor:pointer;font-size:13px;">

  </button>

  <button id="toggleLabels"  style="border:1px solid #ccc;border-radius:4px;padding:5px 10px;cursor:pointer;background:#f8f8f8;font-size:13px;">🌚 나라이름</button>
  <button id="toggleBorders" style="border:1px solid #ccc;border-radius:4px;padding:5px 10px;cursor:pointer;background:#f8f8f8;font-size:13px;">🌝 국경선</button>
  <button id="toggleGrids"   style="border:1px solid #ccc;border-radius:4px;padding:5px 10px;cursor:pointer;background:#f8f8f8;font-size:13px;">🌚 위선경선</button>
  <button id="toggleEquator" style="border:1px solid #ccc;border-radius:4px;padding:5px 10px;cursor:pointer;background:#f8f8f8;font-size:13px;">🌝 적도</button>
  <button id="zoomIn">＋</button>
  <button id="zoomOut">－</button>
  <button id="resetZoom">초기화</button>
  <button id="savePng">PNG 저장</button>
  <span id="zoomLevel">확대 레벨: 1.00</span>
</div>

<div id="tooltip"></div>

<div id="main-container">
  <div id="map-wrap">
    <svg id="map" preserveAspectRatio="xMidYMid meet"></svg>
  </div>

  <!-- 도시 선택 패널 -->
  <div id="city-panel">
    <div id="panel-header">
      <span>🏙️ 도시 목록</span>
      <div class="ph-right">
        <button id="btn-panel-deselect">전체 해제</button>
        <button id="btn-panel-close" title="닫기" style="border:none;background:none;font-size:16px;cursor:pointer;color:#999;padding:0 2px;">✕</button>
      </div>
    </div>
    <div id="panel-search-wrap">
      <input type="text" id="panel-search" placeholder="🔍  도시 검색..." />
      <span id="btn-search-clear">← 목록으로</span>
    </div>
    <div id="panel-selected-summary">선택된 도시 없음</div>
    <div id="panel-list"></div>
  </div>

  <!-- 핀 패널 (그냥 내가 점찍기) -->
  <div id="pin-panel">
    <div id="pin-panel-header">
      <span>📍 내가 찍은 점</span>
      <div class="ph-right">
        <button id="btn-pin-deselect">전체 해제</button>
        <button id="btn-pin-panel-close" title="닫기" style="border:none;background:none;font-size:16px;cursor:pointer;color:#999;padding:0 2px;">✕</button>
      </div>
    </div>
    <div id="pin-selected-summary" style="color:#aaa;">찍은 점 없음</div>
    <div id="pin-list"></div>
  </div>
</div>

function updateSummary() {

// 대륙 접힘 상태 저장 — 기본값: 모두 접힘
const collapsedContinents = new Set(CONTINENT_ORDER);

// ===== 패널 리스트 빌드 =====
function buildPanelList(filter = '') {
  const container = document.getElementById('panel-list');
  container.innerHTML = '';
  const fl = filter.trim().toLowerCase();
  const isSearch = fl.length > 0;

  const grouped = {};
  CONTINENT_ORDER.forEach(c => { grouped[c] = []; });
  CITIES.forEach(city => {
    if (!grouped[city.continent]) grouped[city.continent] = [];
    if (!fl || city.name.toLowerCase().includes(fl)) {
      grouped[city.continent].push(city);
    }
  });

  let anyResult = false;
  CONTINENT_ORDER.forEach(continent => {
    const cities = grouped[continent];
    if (!cities || !cities.length) return;
    anyResult = true;
    const sorted = [...cities].sort((a, b) => a.name.localeCompare(b.name, 'ko'));

    // 대륙 헤더
    const isCollapsed = !isSearch && collapsedContinents.has(continent);
    const selectedCount = sorted.filter(c => selectedCities.has(c.name)).length;

    const lbl = document.createElement('div');
    lbl.className = 'continent-label';
    lbl.style.cssText = 'cursor:pointer; display:flex; justify-content:space-between; align-items:center; user-select:none;';

    const lblLeft = document.createElement('span');
    lblLeft.textContent = continent;

    const lblRight = document.createElement('span');
    lblRight.style.cssText = 'display:flex; align-items:center; gap:6px; font-size:11px;';
    if (selectedCount > 0) {
      const badge = document.createElement('span');
      badge.textContent = `✔${selectedCount}`;
      badge.style.cssText = 'color:#1a73e8; font-weight:bold;';
      lblRight.appendChild(badge);
    }
    const arrow = document.createElement('span');
    arrow.textContent = isCollapsed ? '▶' : '▼';
    arrow.style.cssText = 'color:#999; font-size:10px;';
    lblRight.appendChild(arrow);

    lbl.appendChild(lblLeft);
    lbl.appendChild(lblRight);

    // 도시 행 묶음
    const cityWrap = document.createElement('div');
    cityWrap.style.display = isCollapsed ? 'none' : 'block';

    lbl.addEventListener('click', () => {
      if (isSearch) return; // 검색 중엔 토글 안 함
      if (collapsedContinents.has(continent)) {
        collapsedContinents.delete(continent);
        cityWrap.style.display = 'block';
        arrow.textContent = '▼';
      } else {
        collapsedContinents.add(continent);
        cityWrap.style.display = 'none';
        arrow.textContent = '▶';
      }
    });

    container.appendChild(lbl);

    sorted.forEach(city => {
      const row = document.createElement('div');
      row.className = 'city-row';

      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.checked = selectedCities.has(city.name);

      const nameEl = document.createElement('span');
      nameEl.className = 'city-name' + (selectedCities.has(city.name) ? ' checked' : '');
      nameEl.textContent = city.name;

      const toggle = () => {
        if (selectedCities.has(city.name)) {
          selectedCities.delete(city.name);
          cb.checked = false;
          nameEl.classList.remove('checked');
        } else {
          selectedCities.add(city.name);
          cb.checked = true;
          nameEl.classList.add('checked');
        }
        // 대륙 배지 카운트 갱신
        const cnt = sorted.filter(c => selectedCities.has(c.name)).length;
        const b = lbl.querySelector('span[data-badge]') || (() => {
          const nb = document.createElement('span');
          nb.dataset.badge = '1';
          nb.style.cssText = 'color:#1a73e8; font-weight:bold;';
          lblRight.insertBefore(nb, arrow);
          return nb;
        })();
        if (cnt > 0) { b.textContent = `✔${cnt}`; b.style.display = ''; }
        else { b.style.display = 'none'; }
        updateSummary();
        renderCityDots();
      };
      cb.addEventListener('change', toggle);
      nameEl.addEventListener('click', toggle);

      row.appendChild(cb);
      row.appendChild(nameEl);
      cityWrap.appendChild(row);
    });

    container.appendChild(cityWrap);
  });

  if (!anyResult) {
    const msg = document.createElement('div');
    msg.className = 'no-result';
    msg.textContent = '검색 결과가 없습니다';
    container.appendChild(msg);
  }
}

  const gridGroup2   = svg.append("g").attr("class","grids2");
  const equatorGroup1= svg.append("g").attr("class","equator1");
  const equatorGroup2= svg.append("g").attr("class","equator2");
  const cityGroup1   = svg.append("g").attr("class","cities1");
  const cityGroup2   = svg.append("g").attr("class","cities2");
  // 직접 찍기 레이어 (cityGroup 위에, 항상 최상단)
  const pinGroup1    = svg.append("g").attr("class","pins1");
  const pinGroup2    = svg.append("g").attr("class","pins2").attr("transform",`translate(${vw},0)`);

  let gridVisible=false, labelsVisible=false, equatorVisible=true, bordersVisible=true;

  const graticule = d3.geoGraticule().step([30, 30]);
  gridGroup1.append("path").datum(graticule()).attr("class","grid-line").attr("d",path);
  gridGroup1.style("display","none");
  gridGroup2.append("path").datum(graticule()).attr("class","grid-line").attr("d",path).attr("transform",`translate(${vw},0)`);
  gridGroup2.style("display","none");

  const equator = {type:"LineString",coordinates:d3.range(-180,181,1).map(lon=>[lon,0])};
  equatorGroup1.append("path").datum(equator).attr("class","equator-line").attr("d",path);
  equatorGroup2.append("path").datum(equator).attr("class","equator-line").attr("d",path).attr("transform",`translate(${vw},0)`);

  document.querySelectorAll('.palette-box').forEach(box => {
    box.addEventListener('click', () => { document.getElementById('colorPicker').value = box.getAttribute('data-color'); });
  });

  const world = await d3.json("https://unpkg.com/world-atlas@2/countries-50m.json");
  const features = topojson.feature(world, world.objects.countries).features;
  const landMesh   = topojson.mesh(world, world.objects.countries, (a,b) => a===b);
  const borderMesh = topojson.mesh(world, world.objects.countries, (a,b) => a!==b);
  const countryColors = new Map();
  const tooltip = d3.select('#tooltip');

  [mapGroup1, mapGroup2].forEach(group => {
    group.selectAll("path.country").data(features).enter().append("path")
      .attr("class","country").attr("d",path).attr("fill","#ffffff")
      .style("stroke","#666").style("stroke-width","0.3px")
      .on("click",(event,d) => {
        const id = d.id;
        if (manualMode) return;  // 점찍기 모드에서는 나라 색칠 차단
        if (countryColors.has(id)) countryColors.delete(id);
        else countryColors.set(id, document.getElementById("colorPicker").value);
        updateColors();
      })
      .on("pointerenter",(event,d) => { tooltip.style("display","block").text(d.properties.name); })
      .on("pointermove", event => { tooltip.style("transform",`translate(${event.clientX+26}px,${event.clientY+28}px)`); })
      .on("pointerleave", () => { tooltip.style("display","none"); });

    group.append("path").datum(landMesh).attr("class","land-outline").attr("d",path)
      .attr("fill","none").attr("stroke","#666").attr("stroke-width","0.3px").attr("pointer-events","none");
    group.append("path").datum(borderMesh).attr("class","border-mesh").attr("d",path)
      .attr("fill","none").attr("stroke","#666").attr("stroke-width","0.3px").attr("pointer-events","none");
  });

  function updateBorders() {
    svg.selectAll(".border-mesh").style("display", bordersVisible ? "block":"none");
    svg.selectAll("path.country").style("stroke", bordersVisible ? "#666":"none");
  }

  // ===== 도시 점 렌더 =====
  window.renderCityDots = function() {
    const r     = parseFloat(document.getElementById('dotSize').value);
    const color = document.getElementById('dotColor').value;
    const selected = CITIES.filter(c => selectedCities.has(c.name));

    [cityGroup1, cityGroup2].forEach((g, gi) => {
      g.selectAll("circle.city-dot").remove();
      g.selectAll("circle.city-dot").data(selected).enter().append("circle")
        .attr("class","city-dot")
        .attr("cx", d => projection([d.lng, d.lat])[0])
        .attr("cy", d => projection([d.lng, d.lat])[1])
        .attr("r", r)
        .attr("fill", color)
        .attr("stroke","#fff")
        .attr("stroke-width", Math.max(0.5, r * 0.2))
        .attr("pointer-events","all")
        .on("pointerenter",(event,d) => { tooltip.style("display","block").text(d.name); })
        .on("pointermove", event => { tooltip.style("transform",`translate(${event.clientX+26}px,${event.clientY+28}px)`); })
        .on("pointerleave", () => { tooltip.style("display","none"); });
    });
  };



  // ===== 줌 =====
  const zoomBehavior = d3.zoom().scaleExtent([0.5, 8])
    .on("zoom", ({transform}) => {
      const {k, x, y} = transform;
      mapGroup1.attr("transform", transform);
      mapGroup2.attr("transform", `translate(${vw*k+x},${y}) scale(${k})`);
      labelsGroup1.attr("transform", transform);
      labelsGroup2.attr("transform", `translate(${vw*k+x},${y}) scale(${k})`);
      gridGroup1.attr("transform", transform);
      gridGroup2.attr("transform", transform);
      equatorGroup1.attr("transform", transform);
      equatorGroup2.attr("transform", transform);
      cityGroup1.attr("transform", transform);
      cityGroup2.attr("transform", `translate(${vw*k+x},${y}) scale(${k})`);
      pinGroup1.attr("transform", transform);
      pinGroup2.attr("transform", `translate(${vw*k+x},${y}) scale(${k})`);
      document.getElementById("zoomLevel").innerText = `확대 레벨: ${k.toFixed(2)}`;
    });

  svg.call(zoomBehavior).on("dblclick.zoom", null);

  document.getElementById("oceanColorSelect").addEventListener("change", () => {
    background.attr("fill", document.getElementById("oceanColorSelect").value);
  });

  function updateColors() {
    const base = document.getElementById("baseColorSelect").value;
    [mapGroup1, mapGroup2].forEach(group => {
      group.selectAll("path.country")
        .attr("fill", d => countryColors.get(d.id) || base)

  }

  const centroids = new Map(features.map(f => [f.id, projection(d3.geoCentroid(f))]));
  function updateLabels() {
    [labelsGroup1, labelsGroup2].forEach((g) => {
      g.selectAll("text").remove();
      g.selectAll("text").data(features).enter().append("text")
        .attr("class","labels")
        .attr("x", d => centroids.get(d.id)?.[0] ?? 0)
        .attr("y", d => centroids.get(d.id)?.[1] ?? 0)
        .text(d => d.properties.name)
        .style("display", labelsVisible ? "block":"none");
    });
  }

  function setToggleEmoji(id, visible) {
    const btn = document.getElementById(id);
    const label = btn.textContent.replace(/🌝|🌚/,'').trim();
    btn.textContent = (visible ? '🌝 ' : '🌚 ') + label;
  }

  document.getElementById("toggleLabels").onclick  = () => { labelsVisible  = !labelsVisible;  updateLabels();  setToggleEmoji('toggleLabels',  labelsVisible); };
  document.getElementById("toggleBorders").onclick = () => { bordersVisible = !bordersVisible; updateBorders(); setToggleEmoji('toggleBorders', bordersVisible); };
  document.getElementById("toggleGrids").onclick   = () => {
    gridVisible = !gridVisible;
    gridGroup1.style("display", gridVisible ? "block":"none");
    gridGroup2.style("display", gridVisible ? "block":"none");
    setToggleEmoji('toggleGrids', gridVisible);
  };
  document.getElementById("toggleEquator").onclick = () => {
    equatorVisible = !equatorVisible;
    equatorGroup1.style("display", equatorVisible ? "block":"none");
    equatorGroup2.style("display", equatorVisible ? "block":"none");
    setToggleEmoji('toggleEquator', equatorVisible);
  };
  document.getElementById("zoomIn").onclick  = () => { const t=d3.zoomTransform(svgEl); svg.transition().call(zoomBehavior.scaleTo, Math.min(8, t.k+0.1)); };
  document.getElementById("zoomOut").onclick = () => { const t=d3.zoomTransform(svgEl); svg.transition().call(zoomBehavior.scaleTo, Math.max(0.5, t.k-0.1)); };

  document.getElementById("resetZoom").onclick = () => {
    const korea = features.find(f => f.properties.name === 'South Korea');
    if (korea) {
      const [x,y] = projection(d3.geoCentroid(korea));

  // 핀 패널 리스트 빌드
  function buildPinList() {
    const list = document.getElementById('pin-list');

    const visibleCount = manualPins.filter(p => p.visible).length;

    if (manualPins.length === 0) {

        renderPins();
      });

      row.appendChild(cb);
      row.appendChild(nameEl);
      row.appendChild(delBtn);
      list.appendChild(row);
    });

  document.getElementById('btn-pin-deselect').addEventListener('click', () => {

    const r = parseFloat(document.getElementById('dotSize').value);

    const visible = manualPins.filter(p => p.visible);
    [pinGroup1, pinGroup2].forEach(g => {
      g.selectAll('*').remove();
      visible.forEach(pin => {
        const grp = g.append('g').attr('class','pin-grp');
        grp.append('circle')
          .attr('cx', pin.x).attr('cy', pin.y)
          .attr('r', r + 1.5).attr('fill','#fff').attr('pointer-events','none');
        grp.append('circle')
          .attr('cx', pin.x).attr('cy', pin.y)
          .attr('r', r).attr('fill', color)
          .attr('stroke','#fff').attr('stroke-width', Math.max(0.5, r*0.15))
          .attr('pointer-events','all')
          .on('pointerenter', () => { tooltip.style('display','block').text(`📍 #${pin.num}`); })
          .on('pointermove', ev => { tooltip.style('transform',`translate(${ev.clientX+26}px,${ev.clientY+28}px)`); })
          .on('pointerleave', () => { tooltip.style('display','none'); });
      });
    });
  }

  // 지도 클릭 → 직접 찍기 모드일 때만
  svg.on('click', function(event) {
    if (!manualMode) return;

    // createSVGPoint: 화면 좌표 → SVG viewBox 좌표로 정확히 변환
    const pt = svgEl.createSVGPoint();
    pt.x = event.clientX;
    pt.y = event.clientY;
    const svgP = pt.matrixTransform(svgEl.getScreenCTM().inverse());
    const mx = svgP.x;
    const my = svgP.y;

    const t = d3.zoomTransform(svgEl);
    const {k, x, y} = t;

    // mapGroup2 viewBox 기준 x 시작 = vw*k + x
    const map2StartX = vw * k + x;
    let lx;
    if (mx >= map2StartX) {
      lx = (mx - map2StartX) / k;  // 지도2 → 지도1 로컬 좌표로 정규화
    } else {
      lx = (mx - x) / k;           // 지도1
    }
    const ly = (my - y) / k;

    pinCounter++;
    manualPins.push({ x: lx, y: ly, num: pinCounter, visible: true });
    buildPinList();
    renderPins();
    event.stopPropagation();
  });

  btnManualClear.addEventListener('click', () => {
    if (!manualPins.length) return;
    if (!confirm(`직접 찍은 점 ${manualPins.length}개를 모두 지울까요?`)) return;
    manualPins = []; pinCounter = 0;
    buildPinList(); renderPins();
  });

  document.getElementById('dotSize').addEventListener('input', () => {
    document.getElementById('dotSizeValue').textContent = document.getElementById('dotSize').value + 'px';
    renderCityDots(); renderPins();
  });
  document.getElementById('dotColor').addEventListener('input', () => { renderCityDots(); renderPins(); });

  updateColors();
  renderCityDots();
  renderPins();
  buildPinList();
  updateSummary();
})();
</script>

<script>
document.getElementById('savePng').addEventListener('click', () => {
  const svgNode = document.getElementById('map');
  const clone = svgNode.cloneNode(true);
  clone.querySelectorAll('.country').forEach(el => {
    el.setAttribute('style',`stroke:${el.style.stroke||'#666'};stroke-width:${el.style.strokeWidth||'0.3px'};fill:${el.getAttribute('fill')||'#fff'}`);
  });
  clone.querySelectorAll('.land-outline').forEach(el => el.setAttribute('style','stroke:#666;stroke-width:0.3px;fill:none'));
  clone.querySelectorAll('.border-mesh').forEach(el => el.setAttribute('style',`stroke:#666;stroke-width:0.3px;fill:none;display:${el.style.display}`));
  clone.querySelectorAll('.equator-line').forEach(el => el.setAttribute('style','stroke:red;stroke-width:0.3px;fill:none'));
  clone.querySelectorAll('.grid-line').forEach(el => el.setAttribute('style','stroke:#ccc;stroke-width:0.5px;stroke-dasharray:2 2;fill:none'));

  const url = URL.createObjectURL(new Blob([new XMLSerializer().serializeToString(clone)],{type:'image/svg+xml;charset=utf-8'}));
  const img = new Image();
  img.onload = () => {
    const vb = svgNode.viewBox.baseVal;
    const canvas = document.createElement('canvas');
    canvas.width = vb.width*2; canvas.height = vb.height*2;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = document.getElementById('oceanColorSelect').value;
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(img,0,0,canvas.width,canvas.height);
    canvas.toBlob(blob => {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob); a.download='coloring-map.png'; a.click();
    },'image/png');
  };
  img.src = url;
});
</script>
